name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-to-huggingface:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private GitHub repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Prepare Hugging Face Space folder
        run: |
          mkdir -p hf_space

          cp Dockerfile hf_space/Dockerfile
          cp requirements.txt hf_space/requirements.txt

          cp -r app hf_space/app
          cp -r src hf_space/src || true
          cp -r eval_results hf_space/eval_results || true
          cp autodesk_testset.csv hf_space/autodesk_testset.csv || true
          cp -r retrieval_indexes hf_space/retrieval_indexes || true
          cp -r .streamlit hf_space/.streamlit || true

          rm -f hf_space/.env
          rm -f hf_space/app/.env

          cat > hf_space/README.md <<'EOF'
          ---
          title: Autodesk RAG Assistant
          emoji: 🧠
          colorFrom: blue
          colorTo: indigo
          sdk: docker
          pinned: false
          ---

          # Autodesk RAG Assistant

          Streamlit demo for the Autodesk RAG application. Developed by Husayn El Sharif.

          The source repository is private. This Space contains the deployment version of the app.
          EOF

      - name: Sync to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail

          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"

          git clone "https://helsharif:${HF_TOKEN}@huggingface.co/spaces/helsharif/autodesk-rag-assistant" hf_repo

          find hf_repo -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a hf_space/. hf_repo/

          cd hf_repo
          git lfs install
          git add -A

          if git diff --cached --quiet; then
            echo "No Hugging Face Space changes to sync."
          else
            git commit -m "Sync Space from GitHub ${GITHUB_SHA}"
            git push
          fi
