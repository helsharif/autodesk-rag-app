:{"request":{"origin":"upi","key":"caas/tsarticles/ts/4cM9L2hUkgHjGUBpwPLpP3.html","locale":"en-US"},"response":{"source":"tsarticles","url":"https://help.autodesk.com/ts/4cM9L2hUkgHjGUBpwPLpP3","shortDescription":"Questions and Answers What subscription options are available to me? What is the difference between single-user and multi-user Arnold subscriptions? When should I get a single-user Arnold subscription versus a multi-user Arnold subscription? What are the prices of Arnold single-user and multi-user subscriptions? Are Arnold single-user and multi-user subscriptions available globally? How do I install single-user and multi-user Arnold? Can I switch between multi-user and single-user subscription?","title":"Arnold Subscriptions: Questions and Answers","publishDate":"2022-07-13 00:00:00","contentGroup":["Troubleshooting","Installation & Deployment"],"topicId":"4cM9L2hUkgHjGUBpwPLpP3","caasContent":"\u003cdiv id=\"tsarticles\" class=\"caas_ts\"\u003e\u003ch2\u003eQuestions and Answers\u003c/h2\u003e\n\n\u003col class=\"adskBulletedList\"\u003e\n\t\u003cli\u003e\u003ca href=\"#faq1\"\u003eWhat subscription options are available to me?\u003c/a\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"#faq2\"\u003eWhat is the difference between single-user and multi-user Arnold subscriptions?\u003c/a\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"#faq3\"\u003eWhen should I get a single-user Arnold subscription versus a multi-user Arnold subscription?\u003c/a\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"#faq4\"\u003eWhat are the prices of Arnold single-user and multi-user subscriptions?\u003c/a\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"#faq5\"\u003eAre Arnold single-user and multi-user subscriptions available globally?\u003c/a\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"#faq6\"\u003eHow do I install single-user and multi-user Arnold?\u003c/a\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"#faq7\"\u003eCan I switch between multi-user and single-user subscription?\u003c/a\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"#faq8\"\u003eWhat are Arnold subscription packs?\u003c/a\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"#faq9\"\u003eWhat kind of Arnold subscriptions do I get with a Media &amp; Entertainment Collection subscription?\u003c/a\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"#faq10\"\u003eHow do I sign up for a free 30-day Arnold trial?\u003c/a\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"#faq11\"\u003eWhat happens at the end of my trial?\u003c/a\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"#faq12\"\u003eAre Arnold single-user and multi-user subscriptions available to educational institutions?\u003c/a\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"#faq13\"\u003eHow do I get support for technical or licensing questions?\u003c/a\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"#faq14\"\u003eCan I access previous versions of Arnold?\u003c/a\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"#faq15\"\u003eWho should I contact with general Arnold sales questions?\u003c/a\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch2\u003eOverview\u003c/h2\u003e\n\n\u003cp style=\"padding-left:12px\"\u003eArnold is an advanced Monte Carlo ray tracing renderer. This FAQ provides an overview of Arnold single-user and multi-user subscriptions, Arnold subscription packs, Arnold as a part of the Media and Entertainment Collection, free trials and educational licenses, and support.\u003c/p\u003e\n\n\u003ch2\u003eArnold Single-User and Multi-User Subscriptions\u003c/h2\u003e\n\n\u003cp id=\"faq1\" style=\"padding-left:12px\"\u003e\u003cstrong\u003e1. What subscription options are available to me?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp style=\"padding-left:12px\"\u003eThere are several ways you can subscribe to Arnold:\u003c/p\u003e\n\n\u003cul class=\"adskBulletedList\"\u003e\n\t\u003cli\u003eMonthly, annual, and 3-year single-user subscriptions of Arnold are available on \u003ca href=\"https://www.autodesk.com/products/arnold/overview?term=1-YEAR&amp;tab=subscription\"\u003eAutodesk.com\u003c/a\u003e. Annual and 3-year single-user subscriptions are also available for purchase through Autodesk-authorized resellers.\u003c/li\u003e\n\t\u003cli\u003eAnnual and 3-year multi-user subscriptions of Arnold are available for purchase through \u003ca href=\"https://www.autodesk.com/partners/locate-a-reseller\"\u003eAutodesk-authorized resellers\u003c/a\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp id=\"faq2\" style=\"padding-left:12px\"\u003e\u003cstrong\u003e2. What is the difference between single-user and multi-user Arnold subscriptions?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp style=\"padding-left:12px\"\u003eWith a single-user subscription, it’s possible for you to simply sign into your Autodesk Account to access and start using Arnold. Single-user subscriptions require the Autodesk license to be assigned to a single “named” user. Whereas multi-user access allows licenses to be shared across multiple workstations using a network license server, a single-user license can only be used by the named user. With single-user access, you need to connect to the Internet every 30 days and sign into the software so that Autodesk can verify that the subscription is still current as well as keep the software up to date. There is an in-product reminder 3 days prior to having to reconnect.\u003c/p\u003e\n\n\u003cp id=\"faq3\" style=\"padding-left:12px\"\u003e\u003cstrong\u003e3. When should I get a single-user Arnold subscription versus a multi-user Arnold subscription?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp style=\"padding-left:12px\"\u003eIf you are an individual artist or small studio rendering on a local network of workstations, your best option is to get a monthly, annual, or 3-year single-user subscription on \u003ca href=\"https://www.autodesk.com/products/arnold/overview?term=1-YEAR&amp;tab=subscription\"\u003eAutodesk.com\u003c/a\u003e. Upon subscribing to Arnold on the e-store, you will be prompted to create an \u003ca href=\"https://knowledge.autodesk.com/customer-service/account-management/account-profile/create-autodesk-account\"\u003eAutodesk Account\u003c/a\u003e where you can access your subscription. If you are using Arnold on a render farm and require multi-user licenses, you can purchase annual and 3-year multi-user subscriptions from an Autodesk-authorized reseller. Arnold is also available for pay-per-use on the following cloud rendering platforms: \u003ca href=\"https://marketplace.thinkboxsoftware.com/\" target=\"_blank\"\u003eAWS Thinkbox Marketplace\u003c/a\u003e, \u003ca href=\"https://azure.microsoft.com/en-us/solutions/high-performance-computing/rendering/\" target=\"_blank\"\u003eMicrosoft Azure\u003c/a\u003e, and \u003ca href=\"https://www.conductortech.com/\" target=\"_blank\"\u003eConductor Technologies\u003c/a\u003e.\u003c/p\u003e\n\n\u003cp id=\"faq4\" style=\"padding-left:12px\"\u003e\u003cstrong\u003e4. What are the prices of Arnold single-user and multi-user subscriptions?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp style=\"padding-left:12px\"\u003eFor pricing information, you can visit \u003ca href=\"https://www.autodesk.com/products/arnold/overview?term=1-YEAR&amp;tab=subscription\"\u003eAutodesk.com\u003c/a\u003e for single-user subscriptions or contact your Autodesk-authorized reseller for both single-user and multi-user subscription pricing.\u003c/p\u003e\n\n\u003cp id=\"faq5\" style=\"padding-left:12px\"\u003e\u003cstrong\u003e5. Are Arnold single-user and multi-user subscriptions available globally?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp style=\"padding-left:12px\"\u003eYes. Monthly, annual, and 3-year single-user subscriptions of Arnold are available on all standard \u003ca href=\"https://www.autodesk.com/products/arnold/overview?term=3-YEAR&amp;tab=subscription\"\u003eAutodesk.com\u003c/a\u003e sites, just like 3ds Max® and Maya®. You can also purchase annual and 3-year single-user subscriptions from an Autodesk-authorized reseller, in addition to annual and 3-year multi-user subscriptions.\u003c/p\u003e\n\n\u003cp id=\"faq6\" style=\"padding-left:12px\"\u003e\u003cstrong\u003e6. How do I install single-user and multi-user Arnold?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp style=\"padding-left:12px\"\u003eAfter purchasing a subscription, you can sign into your Autodesk Account to access and install Arnold plugins for Maya, 3ds Max, Cinema 4D, Houdini, and Katana. You can also use this sign-in information to manage your subscription and access Arnold through your Autodesk Account.\u003c/p\u003e\n\n\u003cp id=\"faq7\" style=\"padding-left:12px\"\u003e\u003cstrong\u003e7. Can I switch between multi-user and single-user subscription?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp style=\"padding-left:12px\"\u003eYou may choose a different subscription option once the term of your current subscription plan expires. It is not possible to switch plans mid-term.\u003c/p\u003e\n\n\u003ch2\u003eArnold Subscription Packs\u003c/h2\u003e\n\n\u003cp id=\"faq8\" style=\"padding-left:12px\"\u003e\u003cstrong\u003e8. What are Arnold subscription packs?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp style=\"padding-left:12px\"\u003eArnold subscription packs bundle multiple Arnold renderer subscriptions together, which can be used locally or on the cloud (as enabled by Cloud Rights - see further details on the \u003ca href=\"https://knowledge.autodesk.com/support/3ds-max/learn-explore/caas/sfdcarticles/sfdcarticles/Subscription-Benefits-FAQ-Cloud-Rights.html\"\u003eSubscription Benefits FAQ: Cloud Rights for 3ds Max and Maya\u003c/a\u003e on the \u003ca href=\"https://knowledge.autodesk.com/\"\u003eAutodesk Knowledge Network (AKN)\u003c/a\u003e). You can choose between a subscription 5-pack (meaning 5 multi-user Arnold subscriptions included in the pack), a 25-pack, or 100-pack. For more information, you can see the \u003ca href=\"https://knowledge.autodesk.com/search-result/caas/simplecontent/content/introducing-subscription-packs-for-arnold.html\"\u003eArnold Subscription Packs FAQ\u003c/a\u003e on the Autodesk Knowledge Network.\u003c/p\u003e\n\n\u003ch2\u003eArnold as part of the Media &amp; Entertainment Collection\u003c/h2\u003e\n\n\u003cp id=\"faq9\" style=\"padding-left:12px\"\u003e\u003cstrong\u003e9. What kind of Arnold subscriptions do I get with a Media &amp; Entertainment Collection subscription?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp style=\"padding-left:12px\"\u003eFor information on Arnold subscriptions as a part of the Media &amp; Entertainment Collection, see the \u003ca href=\"https://knowledge.autodesk.com/support/3ds-max/learn-explore/caas/sfdcarticles/sfdcarticles/Changes-to-Media-Entertainment-Collection-FAQ.html\"\u003eMedia &amp; Entertainment Collection FAQ\u003c/a\u003e on AKN.\u003c/p\u003e\n\n\u003ch2\u003eArnold Free Trials and Educational Licenses\u003c/h2\u003e\n\n\u003cp id=\"faq10\" style=\"padding-left:12px\"\u003e\u003cstrong\u003e10. How do I sign up for a free 30-day Arnold trial?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp style=\"padding-left:12px\"\u003eYou can sign up for a 30-day trial of Arnold on the \u003ca href=\"https://www.arnoldrenderer.com/try/\" target=\"_blank\"\u003eArnold website\u003c/a\u003e.\u003c/p\u003e\n\n\u003cp id=\"faq11\" style=\"padding-left:12px\"\u003e\u003cstrong\u003e11. What happens at the end of my trial?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp style=\"padding-left:12px\"\u003eAt the end of a trial, you will be prompted to purchase a subscription of Arnold to continue rendering without a watermark.\u003c/p\u003e\n\n\u003cp id=\"faq12\" style=\"padding-left:12px\"\u003e\u003cstrong\u003e12. Are Arnold single-user and multi-user subscriptions available to educational institutions?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp style=\"padding-left:12px\"\u003eYes. Arnold is available to \u003ca href=\"https://knowledge.autodesk.com/customer-service/account-management/autodesk-for-education/students-and-educators/who-eligible\"\u003eeligible\u003c/a\u003e students, educators, and educational institutions through the \u003ca href=\"https://www.autodesk.com/education/edu-software/overview?sorting=featured&amp;filters=individual\"\u003eAutodesk Education Community\u003c/a\u003e.\u003c/p\u003e\n\n\u003ch2\u003eArnold Support\u003c/h2\u003e\n\n\u003cp id=\"faq13\" style=\"padding-left:12px\"\u003e\u003cstrong\u003e13. How do I get support for technical or licensing questions?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp style=\"padding-left:12px\"\u003eIf you need support, you can sign in to your Autodesk Account and create a case in the Support Requests section. You can also refer to the Autodesk Knowledge Network for information on licensing.\u003c/p\u003e\n\n\u003cp id=\"faq14\" style=\"padding-left:12px\"\u003e\u003cstrong\u003e14. Can I access previous versions of Arnold?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp style=\"padding-left:12px\"\u003eYes. Access to previous versions is available as part of an active subscription per standard Autodesk policy.\u003c/p\u003e\n\n\u003cp style=\"padding-left:12px\"\u003eFor any versions older than Arnold 5, you must make a request to \u003ca href=\"mailto:Arnold.licensing@autodesk.com\"\u003eArnold.licensing@autodesk.com\u003c/a\u003e. An active subscription is also required.\u003c/p\u003e\n\n\u003cp style=\"padding-left:12px\"\u003eFor more information on previous version eligibility, visit the \u003ca href=\"https://knowledge.autodesk.com/customer-service/account-management/users-software/previous-versions/eligible-previous-version-subscription\"\u003eAutodesk Knowledge Network\u003c/a\u003e.\u003c/p\u003e\n\n\u003cp id=\"faq15\" style=\"padding-left:12px\"\u003e\u003cstrong\u003e15. Who should I contact with general Arnold sales questions?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp style=\"padding-left:12px\"\u003eFor general sales questions, you can contact an \u003ca href=\"https://www.autodesk.com/contact?product=ARNOL\"\u003eAutodesk sales representative\u003c/a\u003e or an \u003ca href=\"https://www.autodesk.com/partners/locate-a-reseller\"\u003eAutodesk-authorized reseller\u003c/a\u003e.\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003cp style=\"font-size:12px\"\u003e\u003ci\u003eAutodesk, the Autodesk logo, 3ds Max, and Maya are registered trademarks or trademarks of Autodesk, Inc., and/or its subsidiaries and/or affiliates in the USA and/or other countries. All other brand names, product names, or trademarks belong to their resp ective holders. Autodesk reserves the right to alter product and services offerings, and specifications and pricing at any time without notice, and is not responsible for typographical or graphical errors that may appear in this document. © 2022 Autodesk, Inc. All rights reserved.\u003c/i\u003e\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\u003c/div\u003e","publisher":"Autodesk","language":"english","lastUpdateDate":"2022-07-13 00:00:00","contentUrl":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/4cM9L2hUkgHjGUBpwPLpP3.html","caasKey":"caas/tsarticles/ts/4cM9L2hUkgHjGUBpwPLpP3.html","upiLanguage":"ENU","productLine":["Media & Entertainment Collection","Industry Collections","Arnold"],"nodeId":"4cM9L2hUkgHjGUBpwPLpP3","knowledgeSource":"Technical Support","mediaType":["Text Only"],"audience":["User"],"docnUrl":"arnold-subscriptions-questions-and-answers","contactSupport":"\n\n\n\u003cdiv class=\"xfpage-content-container\"\u003e\n  \n  \u003cdiv class=\"root container responsivegrid\"\u003e\n\n    \n    \n    \n    \u003cdiv id=\"container-3acc490818\" class=\"cmp-container\"\u003e\n        \n        \u003cdiv class=\"flexible-text\"\u003e\u003cdiv id=\"flexible-text-106aeb187a\" class=\"pnl-ft dhig-theme--light dhig-py-8\" data-wat-content-type=\"panel\" data-wat-content-name=\"flexible text-only\" style=\"backgrou
