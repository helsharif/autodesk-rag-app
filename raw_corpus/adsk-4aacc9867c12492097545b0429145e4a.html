t7LqubieI5uE613TnGdU.html","locale":"en-US"},"response":{"source":"tsarticles","url":"https://help.autodesk.com/ts/Qt7LqubieI5uE613TnGdU","shortDescription":"General product information What are the changes that are taking place for the Inventor family of products? Autodesk has made the difficult decision to retire Autodesk Inventor LT and Autodesk Inventor LT Suite. After May 7th, 2021, you can no longer renew a maintenance plan or subscription for Inventor LT, Inventor LT Suite, or Inventor. The changes to the Inventor family of products do not affect Inventor Professional or the Product Design & Manufacturing Collection","title":"Changes to the Autodesk Inventor family of products FAQ","publishDate":"2020-11-06 00:00:00","contentGroup":["Troubleshooting","Installation & Deployment"],"topicId":"Qt7LqubieI5uE613TnGdU","caasContent":"\u003cdiv id=\"tsarticles\" class=\"caas_ts\"\u003e\u003ch2\u003eGeneral product information\u003c/h2\u003e\n\n\u003ch3\u003eWhat are the changes that are taking place for the Inventor family of products?\u003c/h3\u003e\n\n\u003cp\u003eAutodesk has made the difficult decision to retire Autodesk Inventor LT&nbsp;and Autodesk Inventor LT&nbsp;Suite. After May 7th, 2021, you can no longer renew a maintenance plan or subscription for Inventor LT, Inventor LT Suite, or Inventor.\u003c/p\u003e\n\n\u003cp\u003eThe changes to the Inventor family of products \u003cstrong\u003edo not\u003c/strong\u003e affect Inventor Professional or the Product Design &amp; Manufacturing Collection.\u003c/p\u003e\n\n\u003ch3\u003eWhy is Autodesk making this change?\u003c/h3\u003e\n\n\u003cp\u003eOur goal is to provide you with powerful and reliable tools to help you design your products. &nbsp;This change to offer only one version of Inventor will focus our development efforts so we can continue to serve you with professional-grade 3D modeling and documentation tools.\u003c/p\u003e\n\n\u003ch3\u003eWhat is the final release of Inventor LT and Inventor?\u003c/h3\u003e\n\n\u003cp\u003eInventor LT 2021 and Inventor 2021 are the current and final major releases. &nbsp;If you are on maintenance or subscription, you will have access to future point releases.\u003c/p\u003e\n\n\u003ch3\u003eWhat is the final date that I can renew my maintenance plan or subscription?\u003c/h3\u003e\n\n\u003cp\u003eIf you are on a maintenance plan or subscription, you can renew Inventor LT, or Inventor LT Suite, or Inventor until May 7th, 2021.\u003c/p\u003e\n\n\u003chr /\u003e\n\u003ch2\u003eKey dates\u003c/h2\u003e\n\n\u003ch3\u003eWhen will these changes take effect?\u003c/h3\u003e\n\n\u003cul class=\"adskBulletedList\"\u003e\n\t\u003cli\u003eStarting \u003cstrong\u003eNovember 7th, 2020\u003c/strong\u003e, you will not be able to purchase new subscriptions for Inventor LT or Inventor LT Suite.\u003c/li\u003e\n\t\u003cli\u003eStarting \u003cstrong\u003eMay 7th, 2021\u003c/strong\u003e, you can no longer renew maintenance plans or subscription for Inventor LT, Inventor LT Suite, or Inventor.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003chr /\u003e\n\u003ch2\u003eAlternative offerings\u003c/h2\u003e\n\n\u003ch3\u003eWhat is recommended as an alternative if I need similar functions that come with Inventor LT?\u003c/h3\u003e\n\n\u003cp\u003eIf you currently use Inventor LT, either standalone or as part of the Inventor LT Suite, we recommend that you consider subscribing to Fusion 360 when your maintenance plan or subscription ends. Fusion 360 delivers similar functionality that you have access to in Inventor LT, and it provides additional capabilities like assembly modeling, sheet metal design, and CAM. While this is a suitable path for most Inventor LT users, some workflows require Autodesk&nbsp;Inventor&nbsp;Professional software. &nbsp;\u003c/p\u003e\n\n\u003cp\u003eIf your workflows or customers require native Inventor compatibility, then you should consider subscribing to Inventor Professional. It is a comprehensive professional-grade design tool that provides the technology to help automate your processes and connect with stakeholders to get your product to manufacturing faster.\u003c/p\u003e\n\n\u003cp\u003eThe table below provides an overview of common Inventor LT workflows enabled by Fusion 360 and those that require Inventor Professional.\u003c/p\u003e\n\n\u003ctable border=\"1\" cellpadding=\"2\" cellspacing=\"2\" style=\"width: 500px;\"\u003e\n\t\u003ctbody\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003e\u003ca href=\"https://www.autodesk.com/products/fusion-360/overview\"\u003eFusion 360\u003c/a\u003e workflows\u003c/td\u003e\n\t\t\t\u003ctd\u003e\n\t\t\t\u003cul class=\"adskBulletedList\"\u003e\n\t\t\t\t\u003cli\u003ePart modeling that does not require native Inventor compatibility. Inventor assemblies can include Fusion 360 part models via AnyCAD, but they will not display the parametric history.\u003c/li\u003e\n\t\t\t\t\u003cli\u003eDrawing creation that does not require DWG formats to maintain associativity with the 3D model.\u003c/li\u003e\n\t\t\t\t\u003cli\u003eTranslate and work with non-native CAD data. Translators used by Inventor and Fusion 360 are based on the same underlying technology.\u003c/li\u003e\n\t\t\t\t\u003cli\u003ePrepare parts for manufacturing, such as direct editing of model geometry.\u003c/li\u003e\n\t\t\t\u003c/ul\u003e\n\t\t\t\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd\u003e\u003ca href=\"https://www.autodesk.com/products/inventor/overview\"\u003eInventor Professional\u003c/a\u003e workflows\u003c/td\u003e\n\t\t\t\u003ctd\u003e\n\t\t\t\u003cul class=\"adskBulletedList\"\u003e\n\t\t\t\t\u003cli\u003ePart modeling with native Inventor compatibility. This supports modeling parts that are eventually used in Inventor assemblies or if there are clients that require native Inventor models.\u003c/li\u003e\n\t\t\t\t\u003cli\u003eWorking natively with data already created in Inventor LT, such as editing existing model parameters and drawings.\u003c/li\u003e\n\t\t\t\t\u003cli\u003eCreate documentation using 3D annotations and model-based definition tools.\u003c/li\u003e\n\t\t\t\t\u003cli\u003eDrawing creation in native DWG format that maintains associativity to the 3D model for collaborating with others using AutoCAD® software.\u003c/li\u003e\n\t\t\t\u003c/ul\u003e\n\t\t\t\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\u003c/tbody\u003e\n\u003c/table\u003e\n\n\u003ch3\u003eWhat is recommended as an alternative to Inventor LT Suite if I primarily use \u003ca href=\"https://www.autodesk.com/products/autocad-lt/overview?plc=ACDLT&amp;term=1-YEAR&amp;support=ADVANCED&amp;quantity=1\"\u003eAutoCAD LT\u003c/a\u003e?\u003c/h3\u003e\n\n\u003cp\u003eIf you primarily use AutoCAD LT&nbsp;software as part of the Inventor LT Suite, we recommend you subscribe to AutoCAD LT.\u003c/p\u003e\n\n\u003ch3\u003eWhat is recommended as an alternative if I am on maintenance to Inventor?\u003c/h3\u003e\n\n\u003cp\u003eIf you would like to remain current on the enhancements and improvements for Inventor after your maintenance contract ends, you should consider subscribing to Inventor Professional. It includes the professional-grade 3D modeling tools you use today plus tube and pipe, electromechanical design, dynamic simulation, FEA, and more.\u003cbr /\u003e\nIf you use Inventor as part of Product Design Suite or Factory Design Suite, you should consider the benefits of moving to the Product Design &amp; Manufacturing Collection. &nbsp;The collection offers additional integrated applications for advanced simulation, tolerance analysis, nesting, CAM, factory layout design, and advanced rendering and animation capabilities.\u003c/p\u003e\n\n\u003chr /\u003e\n\u003ch2\u003eAdditional questions\u003c/h2\u003e\n\n\u003ch3\u003eWhat happens if I do nothing when my maintenance expires?\u003c/h3\u003e\n\n\u003cp\u003eSince you purchased a perpetual license, you will have access to the software release available at the end of your maintenance plan. &nbsp;After this date, you will continue to have access to that software version indefinitely.\u003c/p\u003e\n\n\u003ch3\u003eWhat happens if I do nothing when my subscription expires?\u003c/h3\u003e\n\n\u003cp\u003eYou will have access to the latest software release until the end of your subscription. &nbsp;After this date, we recommend that you consider Fusion 360 or Inventor Professional based on your current design and engineering workflows. &nbsp;See the table above to help guide you in your decision or speak to your Autodesk representative or Autodesk reseller.\u003c/p\u003e\n\n\u003ch3\u003eAre third party programs that use Inventor API affected when moving from Inventor to Inventor Professional?\u003c/h3\u003e\n\n\u003cp\u003eThird-party programs created with Inventor will run the same in Inventor Professional without editing.\u003c/p\u003e\n\n\u003ch3\u003eWhere can I go to learn more about alternative recommendations?\u003c/h3\u003e\n\n\u003cp\u003eThe following websites will provide an overview of the alternative recommendations in this FAQ.\u003c/p\u003e\n\n\u003cul class=\"adskBulletedList\"\u003e\n\t\u003cli\u003e\u003ca href=\"https://www.autodesk.com/products/fusion-360/overview\"\u003eFusion 360\u003c/a\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"https://www.autodesk.com/products/inventor/overview?plc=INVPROSA&amp;term=1-YEAR&amp;support=ADVANCED&amp;quantity=1\"\u003eInventor Professional\u003c/a\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"https://www.autodesk.com/collections/product-design-manufacturing/overview\"\u003eProduct Design &amp; Manufacturing Collection\u003c/a\u003e\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"https://www.autodesk.com/products/autocad-lt/overview?plc=ACDLT&amp;term=1-YEAR&amp;support=ADVANCED&amp;quantity=1\"\u003eAutoCAD LT\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3\u003eHow can I find more information on these changes?\u003c/h3\u003e\n\n\u003cp\u003eReach out to your Autodesk representative or Autodesk reseller.\u003cbr /\u003e\n&nbsp;\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\u003c/div\u003e","publisher":"Autodesk","language":"english","lastUpdateDate":"2020-11-09 00:00:00","contentUrl":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/Qt7LqubieI5uE613TnGdU.html","caasKey":"caas/tsarticles/ts/Qt7LqubieI5uE613TnGdU.html","upiLanguage":"ENU","productLine":["Inventor","Inventor Products","Product Design & Manufacturing Collection","Industry Collections"],"nodeId":"Qt7LqubieI5uE613TnGdU","knowledgeSource":"Technical Support","mediaType":["Text Only"],"audience":["User"],"docnUrl":"changes-to-the-autodesk-inventor-family-products-faq","contactSupport":"\n\n\n\u003cdiv class=\"xfpage-content-container\"\u003e\n  \n  \u003cdiv class=\"root container responsivegrid\"\u003e\n\n    \n    \n    \n    \u003cdiv id=\"container-3acc490818\" class=\"cmp-container\"\u003e\n        \n        \u003cdiv class=\"flexible-text\"\u003e\u003cdiv id=\"flexible-text-106aeb187a\" class=\"pnl-ft dhig-theme--light dhig-py-8\" data-wat-content-type=\"panel\" data-wat-content-name=\"flexible text-only\" style=\"background-color: #f9f9f9;\"\u003e\n  \u003cdiv class=\"page-container-wrapper\"\u003e\n    \u003cdiv class=\"page-container\"\u003e\n      \n      \u003cdiv class=\"pnl-ft__heading lg:dhig-w-3/5\"\u003e\n\u003cdiv id=\"title-d8bb64ba85\" class=\"cmp-title\"\u003e\n  \u003ch2 class=\"cmp-title__text dhig-typography-headline-medium\"\u003e\n    Need help? Ask the Autodesk Assistant!\u003c/h2\u003e\n\u003c/div\u003e\n\n    \n\n\u003c/div\u003e\n      \u003cdiv class=\"md:dhig-flex\"\u003e\n        \u003cdiv class=\"lg:dhig-w-3/5 md:dhig-w-2/3\"\u003e\n          \n          \u003cdiv class=\"dhig-mt-2 pnl-ft__subheading\"\u003e\n\u003cdiv id=\"text-f19f35bbbd\" class=\"cmp-text dhig-typography-body-copy-medium\"\u003e\n  \u003cdiv class=\"cmp-text-editable\"\u003e\n    \u003cp\u003eThe Assistant can help you find
