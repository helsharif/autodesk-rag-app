:{"request":{"origin":"upi","key":"caas/tsarticles/ts/4QlfhfHA1j4W2evnilVMdY.html","locale":"en-US"},"response":{"source":"tsarticles","url":"https://help.autodesk.com/ts/4QlfhfHA1j4W2evnilVMdY","shortDescription":"Autodesk is discontinuing Showcase. This document provides common questions and answers about this transition. Why is Autodesk discontinuing Showcase? Autodesk® Showcase® is a solution for customers who need to evaluate esthetic and design alternatives of 3D models. Autodesk has been improving visual quality and usability of in-product visualization workflows and has introduced cloud-based visualization technologies","title":"Autodesk® Showcase® Discontinuation FAQ","publishDate":"2017-03-14 00:00:00","contentGroup":["Installation & Deployment","Troubleshooting"],"topicId":"4QlfhfHA1j4W2evnilVMdY","caasContent":"\u003cdiv id=\"tsarticles\" class=\"caas_ts\"\u003e\u003cp\u003eAutodesk is discontinuing Showcase. This document provides common questions and answers about this transition.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eWhy is Autodesk discontinuing Showcase?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eAutodesk® Showcase® is a solution for customers who need to evaluate esthetic and design alternatives of 3D models. Autodesk has been improving visual quality and usability of in-product visualization workflows and has introduced cloud-based visualization technologies. This change will allow us to invest more into modern cloud-based visualization workflows.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eWhen will Showcase be discontinued?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul class=\"adskBulletedList\"\u003e\n\t\u003cli\u003eFrom March 21, 2017, Autodesk will no longer sell new or additional subscriptions of Showcase.\u003c/li\u003e\n\t\u003cli\u003eShowcase will remain part of the 2017 Design Suites composition but will be removed from 2018 Design Suites. Showcase is not included in any industry collections.\u003c/li\u003e\n\t\u003cli\u003eFrom February 1, 2018, Autodesk will no longer offer renewals of subscriptions or maintenance plans for Showcase or deliver any new versions or updates.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eCan I continue to use Showcase after discontinuation?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eYes, if you have a perpetual license or a subscription, you may continue to use Showcase in accordance with those entitlements. Please contact your local authorized Autodesk reseller for more information on your entitlement. Showcase will be removed from 2018 Design Suites. You can continue to use your version of Showcase within your Design Suite, however direct access using Suite workflow to Showcase from within Autodesk products such as AutoCAD, Inventor and Revit may no longer be supported. If you wish to continue using Showcase with newer version of a Design Suite, you may bring in data from newer CAD products using neutral formats such as STEP, IGES, FBX, or DXF to your version of Showcase.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eCan I renew my Showcase subscription?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eYes, you can renew the current subscriptions on a monthly, quarterly, or annual term until January 31, 2018. Multi-year subscription renewals will not be available from March 21, 2017.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eWhat alternative solutions does Autodesk have for Showcase?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eAutodesk provides various design visualization solutions to fulfill different needs and purposes for different industries.\u003c/p\u003e\n\n\u003ctable align=\"left\" border=\"1\" cellpadding=\"0\" cellspacing=\"0\" style=\"width:680px;\" width=\"680\"\u003e\n\t\u003ctbody\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"width:95px;\"\u003e\n\t\t\t\u003cp\u003e\u003cstrong\u003eIndustry\u003c/strong\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:151px;\"\u003e\n\t\t\t\u003cp\u003e\u003cstrong\u003eUsing Showcase with\u003c/strong\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:227px;\"\u003e\n\t\t\t\u003cp\u003e\u003cstrong\u003eUse for Simple Visualization\u003c/strong\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:208px;\"\u003e\n\t\t\t\u003cp\u003e\u003cstrong\u003eUse for Advanced Visualization\u003c/strong\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"width:95px;\"\u003e\n\t\t\t\u003cp\u003e\u003cstrong\u003eGeneral\u003c/strong\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:151px;\"\u003e\n\t\t\t\u003cp\u003eAutoCAD Design Suite\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:227px;\"\u003e\n\t\t\t\u003cp\u003eRendering in A360\u003csup\u003e#2\u003c/sup\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:208px;\"\u003e\n\t\t\t\u003cp\u003e3ds Max\u003csup\u003e#1\u003c/sup\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"width:95px;\"\u003e\n\t\t\t\u003cp\u003e\u003cstrong\u003eAEC\u003c/strong\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:151px;\"\u003e\n\t\t\t\u003cp\u003eBuilding Design Suite\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:227px;\"\u003e\n\t\t\t\u003cp\u003eAutodesk Revit Live\u003csup\u003e#1\u003c/sup\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:208px;\"\u003e\n\t\t\t\u003cp\u003e3ds Max\u003csup\u003e#1\u003c/sup\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"width:95px;\"\u003e\n\t\t\t\u003cp\u003e\u003cstrong\u003eManufacturing\u003c/strong\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:151px;\"\u003e\n\t\t\t\u003cp\u003eFactory Design Suite\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:227px;\"\u003e\n\t\t\t\u003cp\u003eRendering in A360\u003csup\u003e#2\u003c/sup\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:208px;\"\u003e\n\t\t\t\u003cp\u003e3ds Max\u003csup\u003e#1\u003c/sup\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"width:95px;\"\u003e\n\t\t\t\u003cp\u003e\u003cstrong\u003ePlant\u003c/strong\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:151px;\"\u003e\n\t\t\t\u003cp\u003ePlant Design Suite\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:227px;\"\u003e\n\t\t\t\u003cp\u003eRendering in A360\u003csup\u003e#2\u003c/sup\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:208px;\"\u003e\n\t\t\t\u003cp\u003e3ds Max\u003csup\u003e#1\u003c/sup\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"width:95px;\"\u003e\n\t\t\t\u003cp\u003e\u003cstrong\u003eManufacturing\u003c/strong\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:151px;\"\u003e\n\t\t\t\u003cp\u003eProduct Design Suite\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:227px;\"\u003e\n\t\t\t\u003cp\u003eInventor in-product workflows\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:208px;\"\u003e\n\t\t\t\u003cp\u003e3ds Max\u003csup\u003e#1\u003c/sup\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"width:95px;\"\u003e\n\t\t\t\u003cp\u003e\u003cstrong\u003eM&amp;E \u003c/strong\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:151px;\"\u003e\n\t\t\t\u003cp\u003e3ds Max, Maya\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:227px;\"\u003e\n\t\t\t\u003cp\u003eVRED Design\u003csup\u003e#3\u003c/sup\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:208px;\"\u003e\n\t\t\t\u003cp\u003e3ds Max\u003csup\u003e#1\u003c/sup\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\t\u003ctr\u003e\n\t\t\t\u003ctd style=\"width:95px;\"\u003e\n\t\t\t\u003cp\u003e\u003cstrong\u003eAutomotive\u003c/strong\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd style=\"width:151px;\"\u003e\n\t\t\t\u003cp\u003eAlias\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\t\u003ctd colspan=\"2\" style=\"width:435px;\"\u003e\n\t\t\t\u003cp align=\"center\"\u003eVRED Design\u003csup\u003e#3\u003c/sup\u003e\u003c/p\u003e\n\t\t\t\u003c/td\u003e\n\t\t\u003c/tr\u003e\n\t\u003c/tbody\u003e\n\u003c/table\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003cp\u003e\u003csup\u003e#1 \u003c/sup\u003e Not included to all Suite editions. To use, you may need to purchase new subscription.\u003c/p\u003e\n\n\u003cp\u003e\u003csup\u003e#2 \u003c/sup\u003eTo use, you may need to purchase Autodesk cloud credits.\u003c/p\u003e\n\n\u003cp\u003e\u003csup\u003e#3 \u003c/sup\u003eVRED Design can not open or import Showcase files\u003c/p\u003e\n\n\u003cul\u003e\n\t\u003cli\u003e\u003ca href=\"http://www.autodesk.com/products/3ds-max\"\u003eRendering in A360\u003c/a\u003e is a simple cloud rendering service available directly from the Rendering Tab in AutoCAD, Revit, Navisworks and 3ds Max (may require \u003ca href=\"http://www.autodesk.com/products/rendering/overview\"\u003ecloud credits \u003c/a\u003e).\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"http://www.autodesk.com/products/3ds-max\"\u003e3ds Max\u003c/a\u003e provides design visualization for specialists creating advanced renderings with animations, character, crowd sequences, and visual effects.\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"http://www.autodesk.com/products/vred\"\u003eVRED Design\u003c/a\u003e is an interactive design exploration and presentation tool for digital modelers and visualization teams in the automotive industry.\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"http://www.autodesk.com/products/live/overview\"\u003eRevit Live\u003c/a\u003e is an interactive visualization service that offers Revit users the ability to transform their designs into interactive 3D models.\u003c/li\u003e\n\t\u003cli\u003e\u003ca href=\"http://www.autodesk.com/products/inventor\"\u003eInventor\u003c/a\u003e provides in-product visualization workflows for product reviews, rendering, and animation directly within the software.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eWhere can I get more information?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eFor more information about discontinuation of Autodesk Showcase, contact your local authorized Autodesk reseller.\u003c/p\u003e\u003c/div\u003e","publisher":"Autodesk","language":"english","lastUpdateDate":"2017-12-28 00:00:00","contentUrl":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/4QlfhfHA1j4W2evnilVMdY.html","caasKey":"caas/tsarticles/ts/4QlfhfHA1j4W2evnilVMdY.html","upiLanguage":"ENU","nodeId":"4QlfhfHA1j4W2evnilVMdY","knowledgeSource":"Technical Support","mediaType":["Text Only"],"audience":["User"],"docnUrl":"autodesk-C2-AE-showcase-C2-AE-discontinuation-faq","contactSupport":"\n\n\n\u003cdiv class=\"xfpage-content-container\"\u003e\n  \n  \u003cdiv class=\"root container responsivegrid\"\u003e\n\n    \n    \n    \n    \u003cdiv id=\"container-3acc490818\" class=\"cmp-container\"\u003e\n        \n        \u003cdiv class=\"flexible-text\"\u003e\u003cdiv id=\"flexible-text-106aeb187a\" cl
