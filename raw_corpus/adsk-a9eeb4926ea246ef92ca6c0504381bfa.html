estions-and-Answers.html"},{"locale":"fr-CH","url":"https://www.autodesk.fr/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Maya-LT-Questions-and-Answers.html"},{"locale":"hu-HU","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Maya-LT-Questions-and-Answers.html"},{"locale":"it-CH","url":"https://www.autodesk.it/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Maya-LT-Questions-and-Answers.html"},{"locale":"nl-BE","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Maya-LT-Questions-and-Answers.html"},{"locale":"nl-NL","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Maya-LT-Questions-and-Answers.html"},{"locale":"no-NO","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Maya-LT-Questions-and-Answers.html"},{"locale":"pl-PL","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Maya-LT-Questions-and-Answers.html"},{"locale":"pt-PT","url":"https://www.autodesk.com.br/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Maya-LT-Questions-and-Answers.html"},{"locale":"sv-SE","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Maya-LT-Questions-and-Answers.html"},{"locale":"tr-TR","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Maya-LT-Questions-and-Answers.html"},{"locale":"zh-TW","url":"https://www.autodesk.com.cn/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Maya-LT-Questions-and-Answers.html"}]},"loadAA":true,"pageType":"caas"},"productData":{"productDocumentation":{},"bannerBoxData":{},"recommendationLoading":false,"recommendedContent":[],"customContentLoading":false,"error":{"errorType":null,"errorMetaData":null},"productSlug":"","browseTypes":[],"generalTopics":"","contactSupport":""},"caasData":{"request":{"origin":"upi","key":"caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Maya-LT-Questions-and-Answers.html","locale":"en-US"},"response":{"source":"sfdcarticles","url":"http://help.autodesk.com.s3.amazonaws.com/sfdcarticles/Changes-to-Autodesk-Maya-LT-Questions-and-Answers","shortDescription":"Overview On September 14th, 2022, Autodesk will be discontinuing the sale of new and renewal of Autodesk Maya LT software subscription(s). Maya LT software's 3-year subscription offering will be discontinued on September 14th, followed by the end of sale of 1-year and monthly Maya LT subscriptions on December 7th, 2022. Questions and Answers 1. What changes are happening to Maya LT? September 14th, 2022 End of sale of 3-year new and renewal Maya LT subscriptions","title":"Changes to Autodesk Maya LT Questions and Answers","publishDate":"2023-10-08 00:00:00","contentGroup":["Learn & Explore"],"topicId":"kA93g000000H3CO","caasContent":"\u003cdiv id=\"sfdcarticles\" class=\"caas_sf\"\u003e\u003cdiv id=\"sfdcarticles\" class=\"caas_sf\"\u003e\n \u003cdiv id=\"issue\" class=\"adskkb_issues\"\u003e\n  \u003ch3\u003e\u003c/h3\u003e\n  \u003ch3\u003eOverview\u003c/h3\u003e On September 14th, 2022, Autodesk will be discontinuing the sale of new and renewal of Autodesk Maya LT software subscription(s). Maya LT software's 3-year subscription offering will be discontinued on September 14th, followed by the end of sale of 1-year and monthly Maya LT subscriptions on December 7th, 2022.\n \u003c/div\u003e\n \u003cdiv id=\"solution\" class=\"adskkb_solution\"\u003e\n  \u003ch3\u003e\u003c/h3\u003e\n  \u003ch3\u003eQuestions and Answers\u003c/h3\u003e \u003cbr\u003e\u003cstrong\u003e1. What changes are happening to Maya LT?\u003c/strong\u003e\u003cbr\u003e&nbsp; \n  \u003ctable border=\"1\" style=\"width: 500px;\"\u003e\n   \u003ctbody\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eSeptember 14th, 2022\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eEnd of sale of 3-year new and renewal Maya LT subscriptions.\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eDecember 7th, 2022\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eEnd of sale of new and renewal of Maya LT subscription(s), for 1-year and monthly subscriptions.\u003c/td\u003e\n    \u003c/tr\u003e\n   \u003c/tbody\u003e\n  \u003c/table\u003e \u003cbr\u003e\u003cbr\u003e\u003cstrong\u003e&nbsp;2. Why is Autodesk discontinuing the sale of Maya LT?\u003c/strong\u003e\u003cbr\u003e\u003cbr\u003eTo better serve our customers, we have evolved Maya LT into Autodesk Maya Creative software: a flexible, lower-cost version of Maya with powerful modeling, animation, and rendering tools. Maya Creative provides greater flexibility and uses Autodesk Flex licensing for you to be able to pay for Maya only when you need to use it.\u003cbr\u003e&nbsp;We are doing this for several reasons: \n  \u003cul\u003e\n   \u003cli\u003eTo provide you with the creative toolset of Maya without the limitations of Maya LT.\u003c/li\u003e\n   \u003cli\u003eTo support a much broader range of workflows including Film and TV and high-quality game asset creation. We did this by removing the Maya LT limitations such as reduced polycount export and the inability to render.\u003c/li\u003e\n   \u003cli\u003eTo replace the Maya LT file format with standard Maya file formats (\u003cem\u003e.ma\u003c/em\u003e and \u003cem\u003e.mb\u003c/em\u003e), enabling seamless upgrading of capabilities to Maya as well as easier collaboration between artists working on Maya and Maya Creative.\u003c/li\u003e\n  \u003c/ul\u003e We have also invested in offerings like Maya — for indie users, to provide price-sensitive users with a path to Maya software. See question 5 for more details on Maya Creative and Maya — for indie users.\u003cbr\u003e\u003cbr\u003e\u003cbr\u003e\u003cstrong\u003e3. How will these changes affect me?\u003c/strong\u003e\u003cbr\u003e\u003cbr\u003eYou can continue to purchase all Maya LT subscription offerings until September 13th, 2022.\u003cbr\u003eStarting September 14th, 2022, you will no longer be able to purchase new or renew your existing 3-year subscription(s).\u003cbr\u003eStarting December 7th, 2022, you will no longer be able to purchase new subscriptions or renew your existing monthly and/or yearly subscription(s) of Maya LT.\u003cbr\u003e\u003cbr\u003eTo ensure a smooth transition, Autodesk will issue free 3-year Maya LT subscriptions to customers who have an active subscription on September 14th, 2022. See question 9 for more details.\u003cbr\u003e\u003cbr\u003e\u003cbr\u003e\u003cstrong\u003e4. What are the eligibility requirements to access the free Maya LT subscription?\u003c/strong\u003e\u003cbr\u003e\u003cbr\u003eTo be eligible to access the free 3-year Maya LT subscription, you must have an active Maya LT subscription at the time of announcement on September 14th, 2022. &nbsp;\u003cbr\u003e\u003cbr\u003eThe free 3-year subscription includes continued access to technical support and previous versions per the \u003ca href=\"https://www.autodesk.com/company/terms-of-use/en/subscription-benefits#support\" target=\"_blank\"\u003eAutodesk standard policy\u003c/a\u003e. This subscription will not include software upgrades and fixes (including security fixes) regardless of any issue.\u003cbr\u003e&nbsp;\u003cbr\u003e\u003cbr\u003e\u003cstrong\u003e5. What other products can I purchase?\u003c/strong\u003e\u003cbr\u003e\u003cbr\u003eStarting on September 14th, 2022, you can purchase tokens for the newly launched \u003ca href=\"https://www.autodesk.com/products/maya-creative/overview\" target=\"_blank\"\u003e\u003cstrong\u003eMaya Creative\u003c/strong\u003e\u003c/a\u003e. Maya Creative is a more flexible and affordable version of Maya with powerful modeling, animation, rigging, and rendering tools for film, TV, and games production. You can access Maya Creative easily with \u003ca href=\"https://www.autodesk.ca/en/benefits/flex\" target=\"_blank\"\u003eFlex\u003c/a\u003e, a pay-as-you-go option for daily product use. For more info on Maya Creative, please read the \u003ca href=\"https://autode.sk/maya-creative-faq-en\" target=\"_blank\"\u003eFAQ\u003c/a\u003e.\u003cbr\u003e\u003cbr\u003eIf you meet the eligibility criteria, you can also subscribe to an annual subscription to \u003cstrong\u003eMaya — for indie users\u003c/strong\u003e. Maya Indie is an affordable full version of Maya available to customers who meet the following criteria: \n  \u003cul\u003e\n   \u003cli\u003eTotal annual gross revenue from creative work is less than USD $100,000*.\u003c/li\u003e\n   \u003cli\u003eThe license will not be used on any project valued over $100,000 USD.\u003c/li\u003e\n   \u003cli\u003eOnly one license subscription can be used per user or organization\u003c/li\u003e\n   \u003cli\u003eYou are in a country where Maya - for indie users is available.\u003c/li\u003e\n  \u003c/ul\u003e Please read the Autodesk 3ds Max and Maya — for indie users software \u003ca href=\"https://makeanything.autodesk.com/me-indie-faq-usa\" target=\"_blank\"\u003eFAQ\u003c/a\u003e&nbsp;for more details.\u003cbr\u003e&nbsp;\u003cbr\u003e* The annual revenue cap shown is displayed for reference purposes only. The annual revenue varies by country.\u003cbr\u003e&nbsp;\u003cbr\u003e\u003cbr\u003e\u003cstrong\u003e6. Will my Maya LT subscription(s) purchased online continue to auto-renew (if not already turned off)?\u003c/strong\u003e\u003cbr\u003e\u003cbr\u003eCustomers with a 3-year Maya LT subscription will not auto-renew after September 14th, 2022. &nbsp;\u003cbr\u003e\u003cbr\u003eCustomers with monthly and yearly Maya LT subscriptions will continue to auto-renew until December 7th, 2022.\u003cbr\u003e\u003cbr\u003e\u003cbr\u003e\u003cstrong\u003e7. How can I access my free 3-year Maya LT subscription?\u003c/strong\u003e\u003cbr\u003e\u003cbr\u003eIf eligible (see question 4), you can access your free Maya LT subscription through your Autodesk account.\u003cbr\u003e\u003cbr\u003e\u003cbr\u003e\u003cstrong\u003e8. Do I need to assign users once I receive the free 3-year Maya LT subscription?\u003c/strong\u003e\u003cbr\u003e\u003cbr\u003eYes, you must assign users accordingly in your free 3-year Maya LT subscription as Autodesk will not automatically re-assign users based on your original subscription contract.&nbsp;\u003cbr\u003e\u003cbr\u003e\u003cbr\u003e\u003cstrong\u003e9. Will it be possible to renew or change the start and end dates of the free 3-year Maya LT subscription?\u003c/strong\u003e\u003cbr\u003e\u003cbr\u003eAll contracts will start in September 2022 and expire in September 2025. The dates are based on when the entitlement is processed and cannot be amended.&nbsp;\u003cbr\u003e\u003cbr\u003e\u003cbr\u003e\u003cstrong\u003e10. If I purchase a new Maya LT subscription after the announcement date (September 14th, 2022), will I also be eligible for the free 3-year Maya LT subscription?\u003c/strong\u003e\u003cbr\u003e\u003cbr\u003eOnly customers with an existing Maya LT subscription on September 14th, 2022, will be granted the free 3-year Maya LT subscription.&nbsp;\u003cbr\u003e\u003cbr\u003e\u003cbr\u003e\u003cstrong\u003e11. How will these changes affect educational access to Maya LT?\u003c/strong\u003e\u003cbr\u003e\u003cbr\u003eIf you have an existing Maya LT educational license, you can continue to use your license until the end of your subscription term. No new Maya LT educational licenses will be granted as of December 7th, 2022.\u003cbr\u003e&nbsp;\u003cbr\u003eStudents and educators have the option to access Autodesk Maya software through the \u003ca href=\"https://www.autodesk.com/education/edu-software/overview\" target=\"_blank\"\u003eAutodesk Education Community\u003c/a\u003e .\u003cbr\u003e\u003cbr\u003e\u003cbr\u003e\u003cstrong\u003e12. Will support be available for me if I purchase a Maya LT subscription?\u003c/strong\u003e\u003cbr\u003e\u003cbr\u003eIf you have paid for a Maya LT subscription, you will continue to receive technical support until the end of your current Maya LT subscription contract.\u003cbr\u003e\u003cbr\u003e\u003cbr\u003e\u003cstrong\u003e13. Will support be included as part of the free 3-year Maya LT subscription?\u003c/strong\u003e\u003cbr\u003e\u003cbr\u003eTechnical support and previous version access will be available as part of the standard terms of use. New releases, updates and/or fixes (including security fixes) will not be included.&nbsp;\u003cbr\u003e\u003cbr\u003e\u003cbr\u003e\u003cstrong\u003e14. Who can I contact for more information?\u003c/strong\u003e\u003cbr\u003e\u003cbr\u003ePlease contact an \u003ca href=\"https://www.autodesk.com/benefits/overview\" target=\"_blank\"\u003eAutodesk sales representative\u003c/a\u003e or an \u003ca href=\"https://www.autodesk.ca/en/partners/locate-a-reseller\" target=\"_blank\"\u003eAutodesk-authorized reseller\u003c/a\u003e&nbsp;for more information.\n \u003c/div\u003e\n \u003cdiv id=\"products\" class=\"adskkb_products\"\u003e\n  \u003ch3\u003eProducts:\u003c/h3\u003e Maya; Maya LT;\n \u003c/div\u003e\n\u003c/div\u003e\u003c/div\u003e","publisher":"Autodesk","language":"english","releaseYear":"2024","lastUpdateDate":"2023-10-08 00:00:00","contentUrl":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Maya-LT-Questions-and-Answers.html","subSource":"FaqArticle","caasKey":"caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Maya-LT-Questions-and-Answers.html","sfdcId":"kA93g000000H3CO","upiLanguage":"ENU","productRelease":["Maya 2020","Maya LT 2017","Maya LT 2019","Maya 2019","Maya 2023","Maya 2024","Maya 2022","Maya
