elp.autodesk.com.s3.amazonaws.com/sfdcarticles/System-requirements-for-Autodesk-Fusion-360","shortDescription":"What are the System requirements for Autodesk Fusion Ready to get started? Buy now. Download a free trial. How to register for a start-up, hobbyist, or student license for Fusion. System requirements are updated every release and posted in the forum at the following links: Forum readme Post (English). Forum readme Post (German). System requirements for Autodesk Fusion 360 Operating System Apple® macOS macOS Sonoma – Official support coming soon macOS 13 Ventura – (Version 2.0","title":"System requirements for Autodesk Fusion","publishDate":"2023-11-28 00:00:00","contentGroup":["Installation & Deployment","Learn & Explore"],"topicId":"kA93g0000000JwT","caasContent":"\u003cdiv id=\"sfdcarticles\" class=\"caas_sf\"\u003e\u003cdiv id=\"sfdcarticles\" class=\"caas_sf\"\u003e\n \u003cdiv id=\"issue\" class=\"adskkb_issues\"\u003e\n  \u003ch3\u003e\u003c/h3\u003eWhat are the System requirements for Autodesk Fusion\u003cbr\u003e\u003cbr\u003e\u003cb\u003eReady to get started?\u003c/b\u003e\n  \u003cul\u003e\n   \u003cli\u003e\u003ca href=\"https://www.autodesk.com/products/fusion-360/subscribe?utm_source=akn&amp;utm_medium=referral&amp;utm_campaign=system-requirement&amp;mktvar004=1047309&amp;internalc=true\" target=\"_blank\"\u003eBuy now\u003c/a\u003e.\u003c/li\u003e\n   \u003cli\u003e\u003ca href=\"https://www.autodesk.com/products/fusion-360/free-trial\" target=\"_blank\"\u003eDownload a free trial\u003c/a\u003e.\u003c/li\u003e\n   \u003cli\u003e\u003ca href=\"https://www.autodesk.com/support/technical/article/How-to-activate-start-up-or-educational-licensing-for-Fusion-360\" target=\"_blank\"\u003eHow to register for a start-up, hobbyist, or student license for Fusion\u003c/a\u003e.\u003c/li\u003e\n  \u003c/ul\u003e\n \u003c/div\u003e\n \u003cdiv id=\"solution\" class=\"adskkb_solution\"\u003e\n  \u003ch3\u003e\u003c/h3\u003e\n  \u003cp\u003eSystem requirements are updated every release and posted in the forum at the following links:\u003c/p\u003e\n  \u003cul\u003e\n   \u003cli\u003e\u003ca href=\"http://forums.autodesk.com/t5/design-validate-document/fusion-360-readme/td-p/4311780\" target=\"_blank\"\u003eForum readme Post\u003c/a\u003e&nbsp;(English).\u003c/li\u003e\n   \u003cli\u003e\u003ca href=\"https://forums.autodesk.com/t5/fusion-360-deutsch/fusion-360-readme/td-p/6463979\" target=\"_blank\"\u003eForum readme Post\u003c/a\u003e (German).\u003c/li\u003e\n  \u003c/ul\u003e &nbsp; \n  \u003ctable border=\"1\" cellpadding=\"2\" cellspacing=\"0\"\u003e\n   \u003cthead\u003e\n    \u003ctr\u003e\n     \u003cth colspan=\"2\" rowspan=\"1\" style=\"text-align: left;background-color: #eeeeee;\"\u003e\u003cb\u003eSystem requirements for Autodesk Fusion 360\u003c/b\u003e\u003c/th\u003e\n    \u003c/tr\u003e\n   \u003c/thead\u003e\n   \u003ctbody\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;width: 100px;\"\u003e\u003cstrong\u003eOperating System\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cu\u003eApple® macOS&nbsp;\u003c/u\u003e\n      \u003cul\u003e\n       \u003cli\u003emacOS Sonoma&nbsp;– \u003cstrong\u003e\u003cspan style=\"color: #e74c3c;\"\u003eOfficial support coming soon\u003c/span\u003e\u003c/strong\u003e\u003c/li\u003e\n       \u003cli\u003emacOS 13 Ventura – (Version 2.0.15289 or newer)\u003c/li\u003e\n       \u003cli\u003emacOS&nbsp;12 Monterey&nbsp;\u003c/li\u003e\n       \u003cli\u003emacOS 11 Big Sur&nbsp;– \u003cstrong\u003e\u003cspan style=\"color: #e74c3c;\"\u003eUntil March 2024\u003c/span\u003e\u003c/strong\u003e (\u003ca href=\"https://www.autodesk.com/support/technical/article/End-of-life-for-Fusion-360-on-macOS-10-16-and-macOS-11-Big-Sur-Effective-March-2024\" target=\"_blank\"\u003eLearn more\u003c/a\u003e)\u003c/li\u003e\n      \u003c/ul\u003e \u003cu\u003eMicrosoft® Windows®&nbsp;\u003c/u\u003e\n      \u003cul\u003e\n       \u003cli\u003eWindows 11&nbsp;\u003c/li\u003e\n       \u003cli\u003eWindows 10 (64-bit) Version 1809 or newer\u003c/li\u003e\n      \u003c/ul\u003e \u003cstrong\u003eNote:&nbsp;\u003ca href=\"https://www.autodesk.com/support/technical/article/Effective-April-4-2023-Fusion-360-no-longer-supports-these-devices-and-operating-systems-OS\" target=\"_blank\"\u003eFusion&nbsp;will not launch on your device running older applications or OS version\u003c/a\u003e\u003c/strong\u003e\u003cbr\u003e &nbsp;\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;width: 100px;\"\u003e\u003cstrong\u003eCPU Type\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003ex86-based 64-bit processor (for example, Intel Core i, AMD Ryzen series), 4 cores, 1.7 GHz or greater; 32-bit not supported\u003cbr\u003e Apple silicon processors require Rosetta 2 - \u003ca href=\"https://www.autodesk.com/products/fusion-360/blog/running-fusion-360-on-apple-silicon-faq/\" target=\"_blank\"\u003esee this post for more information\u003c/a\u003e.&nbsp;\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003eMemory\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e4 GB of RAM (integrated graphics recommend 6 GB or more)\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003eGraphics Card\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003eDirectX11 (Direct3D 10.1 or greater)\u003cbr\u003e Dedicated GPU with 1 GB or more of VRAM\u003cbr\u003e Integrated graphics with 6 GB or more of RAM\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003eDisk Space\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e8.5 GB of storage\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;width: 100px;\"\u003e\u003cstrong\u003eDisplay Resolution\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e1366 x 768 (1920 x 1080 or greater at 100% scale recommended)\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003ePointing Device\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003eHID-compliant mouse or trackpad, optional Wacom® tablet and 3Dconnexion SpaceMouse® support\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003eInternet\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e2.5 Mbps or faster download; 500 Kbps or faster upload\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003eDependencies\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003eSSL 3.0, TLS 1.2+,&nbsp;.NET Framework 4.5 or newer required to submit crash reports\u003c/td\u003e\n    \u003c/tr\u003e\n   \u003c/tbody\u003e\n  \u003c/table\u003e &nbsp; \n  \u003ctable border=\"1\" cellpadding=\"2\" cellspacing=\"0\"\u003e\n   \u003cthead\u003e\n    \u003ctr\u003e\n     \u003cth colspan=\"2\" rowspan=\"1\" style=\"text-align: left;background-color: #eeeeee;\"\u003e\u003cb\u003eRecommended specs for complex modeling and processing\u003c/b\u003e\u003c/th\u003e\n    \u003c/tr\u003e\n   \u003c/thead\u003e\n   \u003ctbody\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003eCPU Type\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e3 GHz or greater, 6 or more cores\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;width: 100px;\"\u003e\u003cstrong\u003eMemory\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e8-GB RAM or greater\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003eGraphics\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003eDedicated GPU with 4 GB or more VRAM, DirectX 11 (Direct3D 11 or greater)\u003c/td\u003e\n    \u003c/tr\u003e\n   \u003c/tbody\u003e\n  \u003c/table\u003e \u003cbr\u003e*For more information on support for macOS 11.x (Big Sur) running on ARM-based processors- \u003ca href=\"https://forums.autodesk.com/t5/fusion-360-support/running-fusion-360-with-rosetta-2-on-apple-arm-based-m1-chipsets/td-p/9876850\" target=\"_blank\"\u003evisit this forum post\u003c/a\u003e.&nbsp;\u003cbr\u003e**For more information on support for Microsoft® Windows® 7 (64-bit) - visit \u003ca href=\"https://knowledge.autodesk.com/support/fusion-360/learn-explore/caas/simplecontent/content/fusion-360-announcing-end-support-for-windows-7.html\" target=\"_blank\"\u003ethis knowledge article\u003c/a\u003e.\n \u003c/div\u003e\n \u003cdiv id=\"seealso\" class=\"adskkb_seealso\"\u003e\n  \u003ch3\u003eSee Also:\u003c/h3\u003e&nbsp; \n  \u003cul\u003e\n   \u003cli\u003e\u003ca href=\"https://www.autodesk.com/support/technical/article/Is-there-any-way-to-install-Fusion-360-in-Linux\" targe
