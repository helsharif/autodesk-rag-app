nical/article/caas/tsarticles/ts/5DfRaO9ymiBg9U2SLedoKC.html"},{"locale":"fr-BE","url":"https://www.autodesk.fr/support/technical/article/caas/tsarticles/ts/5DfRaO9ymiBg9U2SLedoKC.html"},{"locale":"fr-CA","url":"https://www.autodesk.fr/support/technical/article/caas/tsarticles/ts/5DfRaO9ymiBg9U2SLedoKC.html"},{"locale":"fr-CH","url":"https://www.autodesk.fr/support/technical/article/caas/tsarticles/ts/5DfRaO9ymiBg9U2SLedoKC.html"},{"locale":"hu-HU","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/5DfRaO9ymiBg9U2SLedoKC.html"},{"locale":"it-CH","url":"https://www.autodesk.it/support/technical/article/caas/tsarticles/ts/5DfRaO9ymiBg9U2SLedoKC.html"},{"locale":"nl-BE","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/5DfRaO9ymiBg9U2SLedoKC.html"},{"locale":"nl-NL","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/5DfRaO9ymiBg9U2SLedoKC.html"},{"locale":"no-NO","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/5DfRaO9ymiBg9U2SLedoKC.html"},{"locale":"pl-PL","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/5DfRaO9ymiBg9U2SLedoKC.html"},{"locale":"pt-PT","url":"https://www.autodesk.com.br/support/technical/article/caas/tsarticles/ts/5DfRaO9ymiBg9U2SLedoKC.html"},{"locale":"sv-SE","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/5DfRaO9ymiBg9U2SLedoKC.html"},{"locale":"tr-TR","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/5DfRaO9ymiBg9U2SLedoKC.html"},{"locale":"zh-TW","url":"https://www.autodesk.com.cn/support/technical/article/caas/tsarticles/ts/5DfRaO9ymiBg9U2SLedoKC.html"}]},"loadAA":true,"pageType":"caas"},"productData":{"productDocumentation":{},"bannerBoxData":{},"recommendationLoading":false,"recommendedContent":[],"customContentLoading":false,"error":{"errorType":null,"errorMetaData":null},"productSlug":"","browseTypes":[],"generalTopics":"","contactSupport":""},"caasData":{"request":{"origin":"upi","key":"caas/tsarticles/ts/5DfRaO9ymiBg9U2SLedoKC.html","locale":"en-US"},"response":{"source":"tsarticles","url":"https://help.autodesk.com/ts/5DfRaO9ymiBg9U2SLedoKC","shortDescription":"This document addresses Dynamo Studio, why it’s discontinuing as a standalone product, and how Dynamo is accessible through other tools you may be already using","title":"Dynamo Studio Frequently Asked Questions","publishDate":"2021-06-03 00:00:00","contentGroup":["Installation & Deployment","Troubleshooting"],"topicId":"5DfRaO9ymiBg9U2SLedoKC","caasContent":"\u003cdiv id=\"tsarticles\" class=\"caas_ts\"\u003e\u003cp\u003eThis document addresses Dynamo Studio, why it&rsquo;s discontinuing as a standalone product, and how Dynamo is accessible through other tools you may be already using.\u003c/p\u003e\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\u003chr /\u003e\n\u003ch2\u003eWhat is happening with Dynamo Studio?\u003c/h2\u003e\n\u003cp\u003eWe&rsquo;re continuing to make Dynamo capabilities and functionality more robust in the tools you&rsquo;re already using including Autodesk Revit, Autodesk Civil 3D, Autodesk Robot Structural Analysis Professional, Autodesk FormIt Pro, Autodesk Advance Steel, and Autodesk Alias software, as well as open source Dynamo Sandbox software. However, we have made the decision to discontinue Autodesk Dynamo Studio software as a standalone product and remove it from the Autodesk AEC Collection starting January 31, 2022.\u003c/p\u003e\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\u003ch2\u003eWhy is Dynamo Studio going away?\u003c/h2\u003e\n\u003cp\u003eSince Dynamo Studio was introduced in 2015, the landscape of process automation and visual scripting has expanded and improved. We&rsquo;ve extended Dynamo capabilities to several tools you&rsquo;re already using including Revit, Civil 3D, Robot Structural Analysis Professional, FormIt Pro, Advance Steel, and Alias, and expressed in Dynamo Sandbox. With more widespread availability of Dynamo capabilities across Autodesk software and tools, we&rsquo;re simplifying our product offerings and focusing our efforts on making Dynamo capabilities in our existing products more robust.\u003c/p\u003e\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\u003ch2\u003eWhat if I have a standalone Dynamo Studio subscription?\u003c/h2\u003e\n\u003cp\u003eIf you already have access to one of the products listed above through another subscription, you can let your Dynamo Studio standalone subscription expire and access Dynamo capabilities through that specific product instead.\u003c/p\u003e\n\u003cp\u003eIf you do not have access to one of the products listed above, you can access open source capabilities of Dynamo through Dynamo Sandbox, but starting January 31, 2022 you will not have access to certain functionalities like geometry, package&nbsp;publishing, and expanded import/export of data types. You will need another Autodesk product to leverage full Dynamo capabilities like these.\u003c/p\u003e\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\u003ch2\u003eWhat if I have an AEC Collection?\u003c/h2\u003e\n\u003cp\u003eYou can access Dynamo capabilities through the products included in your Collection, such as: Revit, Civil 3D, Robot Structural Analysis, FormIt, and Advance Steel.\u003c/p\u003e\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\u003ch2\u003eWhat if I access Dynamo Studio through my Autodesk Enterprise Business Agreement (EBA)?\u003c/h2\u003e\n\u003cp\u003eIf you already have access to one of the products listed above through another subscription, you can unassign Dynamo Studio standalone from users and access Dynamo capabilities through one of the specific products instead.\u003c/p\u003e\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\u003ch2\u003eHow can I access Dynamo through a standalone subscription of other Autodesk products, AEC Collection, or through an Enterprise Business Agreement (EBA)?\u003c/h2\u003e\n\u003cp\u003eYou can access Dynamo capabilities through a host application, and no additional license will be pulled for Dynamo usage. Consider Dynamo a capability of the host, not as a separate application. For example, if you use Revit, Dynamo is a capability within Revit. Revit is available as a standalone subscription or through a subscription to the AEC Collection.\u003c/p\u003e\n\u003cp\u003eIf you have an Enterprise Business Agreement, no token consumptions will be required except for the host application. For example, if you access Dynamo capabilities while using the Revit app, you will only be charged the Revit token rate. There will be no additional tokens charged for the Dynamo capabilities.\u003c/p\u003e\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\u003ch2\u003eWhat are the key dates to know for Dynamo Studio&rsquo;s retirement?\u003c/h2\u003e\n\u003cul class=\"adskBulletedList\"\u003e\n\u003cli\u003eJune 07, 2021 - Dynamo Studio will no longer be available for new sales\u003c/li\u003e\n\u003cli\u003eSeptember 30, 2021 - Dynamo Studio will no longer be available for renewal\u003c/li\u003e\n\u003cli\u003eJanuary 31, 2022 - Dynamo Studio will no longer be available in the AEC Collection or supported as a standalone product\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\u003ch2\u003eWhat&rsquo;s the timeline for ongoing subscription access?\u003c/h2\u003e\n\u003cp\u003eOn January 31, 2022 Dynamo Studio will no longer be supported for AEC Collection and token flex subscribers.\u003c/p\u003e\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\u003ch2\u003eWhat&rsquo;s the difference between Dynamo and Dynamo Studio?\u003c/h2\u003e\n\u003cp\u003eDynamo is a visual programming environment that enables designers to explore parametric conceptual designs and automate tasks. It&rsquo;s already available in the products you may already be using through direct integration or by download.\u003c/p\u003e\n\u003cp\u003eDynamo Studio as a standalone product is a version of Dynamo that allows users to install the application with no other applications needed to get geometry and package publishing tools. This standalone version of Dynamo Studio will no longer be available starting January 31, 2022.\u003c/p\u003e\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\u003ch2\u003eWhat will happen to current graphs in Dynamo Studio on January 31, 2022?\u003c/h2\u003e\n\u003cp\u003eDynamo graphs will not disappear. Though, you will need to migrate to a newer version of Dynamo in any host, or in Dynamo Sandbox, that is version 2.0 or above. When you migrate to one of these newer Dynamo versions there will be a one-off upgrade of those graphs to a new file format; the older XML format will automatically upgrade to the new JSON file format. This upgrade process is similar in result to opening an old Revit file in a new version of Revit.\u003c/p\u003e\n\u003cp\u003ePlease note, nodes that were applicable to the Dynamo Studio application will need to be replaced with alternative workflows.\u003c/p\u003e\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\u003ch2\u003eWhat if I was using Dynamo Studio to read line work in dwg files?\u003c/h2\u003e\n\u003cp\u003eUnfortunately, this workflow will no longer be supported. Other workflows accomplishing similar results can be built using Dynamo for Civil 3D, Dynamo for Advance Steel, or another Dynamo integration to an AutoCAD vertical.\u003c/p\u003e\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\u003ch2\u003eWhat are my alternatives to Dynamo Studio?\u003c/h2\u003e\n\u003cp\u003eAccess Dynamo capabilities through the products you&rsquo;re already using, including:\u003c/p\u003e\n\u003cul class=\"adskBulletedList\"\u003e\n\u003cli\u003e\u003cstrong\u003eRevit\u003c/strong\u003e: Dynamo for Revit extends Building Information Modeling (BIM) and helps designers customize workflows and implement process automation through an open-source visual programming platform with no download required.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCivil 3D\u003c/strong\u003e: Dynamo for Civil 3D applies visual programming for processing simple, repetitive, or complex tasks quickly and efficiently.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRobot Structural Analysis Professional\u003c/strong\u003e: Dynamo for Robot Structural Analysis Professional helps optimize existing structural workflows and helps you create your own optimized structural systems.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFormIt Pro\u003c/strong\u003e: FormIt Pro and Dynamo connect design ideas and simulation data for advanced analysis.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAdvance Steel\u003c/strong\u003e: Dynamo for Advance Steel adds functionalities that can help you quickly generate complex structures and plates to minimize the number of steps required for modeling.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAlias\u003c/strong\u003e: Dynamo for Alias creates custom algorithms and generates geometry for further modification.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDynamo Sandbox\u003c/strong\u003e is an open source environment for visual programming. It&rsquo;s a free download of the core Dynamo technology that isn&rsquo;t integrated into any other product. Though it has limited functionality, it can provide feedback on new features, development, and testing.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLearn more about Dynamo offerings, ways to download, and more at \u003ca href=\"https://dynamobim.org/download/\"\u003eDynamoBIM.org\u003c/a\u003e\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\u003c/div\u003e","publisher":"Autodesk","language":"english","lastUpdateDate":"2021-06-03 00:00:00","contentUrl":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/5DfRaO9ymiBg9U2SLedoKC.html","caasKey":"caas/tsarticles/ts/5DfRaO9ymiBg9U2SLedoKC.html","upiLanguage":"ENU","nodeId":"5DfRaO9ymiBg9U2SLedoKC","knowledgeSource":"Technical Support","mediaType":["Text Only"],"audience":["User"],"docnUrl":"dynamo-studio-faq","contactSupport":"\n\n\n\u003cdiv class=\"xfpage-content-container\"\u003e
