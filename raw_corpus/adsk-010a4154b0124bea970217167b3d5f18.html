icles/sfdcarticles/Autodesk-ArtCAM-Software-End-of-Sale-End-of-Development-FAQs.html"},{"locale":"tr-TR","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/Autodesk-ArtCAM-Software-End-of-Sale-End-of-Development-FAQs.html"},{"locale":"zh-TW","url":"https://www.autodesk.com.cn/support/technical/article/caas/sfdcarticles/sfdcarticles/Autodesk-ArtCAM-Software-End-of-Sale-End-of-Development-FAQs.html"}]},"loadAA":true,"pageType":"caas"},"productData":{"productDocumentation":{},"bannerBoxData":{},"recommendationLoading":false,"recommendedContent":[],"customContentLoading":false,"error":{"errorType":null,"errorMetaData":null},"productSlug":"","browseTypes":[],"generalTopics":"","contactSupport":""},"caasData":{"request":{"origin":"upi","key":"caas/sfdcarticles/sfdcarticles/Autodesk-ArtCAM-Software-End-of-Sale-End-of-Development-FAQs.html","locale":"en-US"},"response":{"source":"sfdcarticles","url":"http://help.autodesk.com.s3.amazonaws.com/sfdcarticles/Autodesk-ArtCAM-Software-End-of-Sale-End-of-Development-FAQs","shortDescription":"Autodesk ArtCAM Software End-of-Sale & End-of-Development FAQs As of July 7, 2018, ArtCAM has been discontinued with no planned future releases or updates. This change will have the following implications for subscribers and customers with active maintenance plans: As of February 7, 2018, customers will no longer be able to purchase a new ArtCAM subscription. Maintenance plan and subscription renewals for ArtCAM will continue to be available until July 7, 2018","title":"Autodesk ArtCAM Software End-of-Sale & End-of-Development FAQs","publishDate":"2019-03-22 00:00:00","contentGroup":["Learn & Explore"],"topicId":"kA93g0000000WFO","caasContent":"\u003cdiv id=\"sfdcarticles\" class=\"caas_sf\"\u003e\u003cdiv id=\"sfdcarticles\" class=\"caas_sf\"\u003e\n \u003cdiv id=\"issue\" class=\"adskkb_issues\"\u003e\n  \u003ch3\u003eIssue:\u003c/h3\u003eAutodesk ArtCAM Software End-of-Sale &amp; End-of-Development FAQs\n \u003c/div\u003e\n \u003cdiv id=\"solution\" class=\"adskkb_solution\"\u003e\n  \u003ch3\u003eSolution:\u003c/h3\u003e\n  \u003cp\u003eAs of July 7, 2018, ArtCAM has been discontinued with no planned future releases or updates.&nbsp;&nbsp;This change will have the following implications for subscribers and customers with active maintenance plans:\u003c/p\u003e\n  \u003cul\u003e\n   \u003cli\u003eAs of February 7, 2018, customers will no longer be able to purchase a new ArtCAM subscription.\u003c/li\u003e\n   \u003cli\u003eMaintenance plan and subscription renewals for ArtCAM will continue to be available until July 7, 2018.\u003c/li\u003e\n   \u003cli\u003eCustomers who have purchased a perpetual license for ArtCAM will continue to own and have full usage rights for that license.\u003c/li\u003e\n   \u003cli\u003eCustomers with an active subscription for ArtCAM on February 7, 2018 will be provided with a complimentary non-maintained perpetual license for ArtCAM 2018 before July 7, 2018.\u003c/li\u003e\n   \u003cli\u003eWith an active subscription or maintenance plan,&nbsp; ArtCAM support will be available from Autodesk until November 1, 2018, by logging in to the&nbsp;\u003ca href=\"https://accounts.autodesk.com/\" target=\"_blank\"\u003eAutodesk Account\u003c/a\u003e, selecting ArtCAM from the Support section, and submitting a ticket via email. Please note this support is only available in English.\u003c/li\u003e\n   \u003cli\u003eAlthough support from Autodesk ended on November 1, 2018,&nbsp;self-service support can still be accessed via the&nbsp;\u003ca href=\"https://knowledge.autodesk.com/support/\" target=\"_blank\"\u003eAutodesk Knowledge Network\u003c/a\u003e (AKN) and peer-to-peer support via the Autodesk Community’s&nbsp;\u003ca href=\"https://forums.autodesk.com/t5/artcam-forum/bd-p/284\" target=\"_blank\"\u003eArtCAM Forum\u003c/a\u003e.\u003c/li\u003e\n  \u003c/ul\u003e &nbsp; \n  \u003cp\u003eThis document provides common questions and answers about this decision for our valued customers.\u003c/p\u003e\n  \u003cul\u003e\n   \u003cli\u003e\u003ca href=\"#Q1\"\u003eWhat is happening to ArtCAM?\u003c/a\u003e\u003c/li\u003e\n   \u003cli\u003e\u003ca href=\"#Q2\"\u003eWill there be any more releases of ArtCAM?\u003c/a\u003e\u003c/li\u003e\n   \u003cli\u003e\u003ca href=\"#Q3\"\u003eKey Dates\u003c/a\u003e\u003c/li\u003e\n   \u003cli\u003e\u003ca href=\"#Q4\"\u003eCan I subscribe to ArtCAM after February 7, 2018?\u003c/a\u003e\u003c/li\u003e\n   \u003cli\u003e\u003ca href=\"#Q5\"\u003eWhat will happen to my ArtCAM perpetual license after February 7, 2018?\u003c/a\u003e\u003c/li\u003e\n   \u003cli\u003e\u003ca href=\"#Q6\"\u003eWhat happens when my maintenance plan or subscription expires after February 7, 2018?\u003c/a\u003e\u003c/li\u003e\n   \u003cli\u003e\u003ca href=\"#Q7\"\u003eWhat happens if my ArtCAM subscription is on auto-renewal?\u003c/a\u003e\u003c/li\u003e\n   \u003cli\u003e\u003ca href=\"#Q8\"\u003eWhen will subscription customers receive a complimentary perpetual license?\u003c/a\u003e\u003c/li\u003e\n   \u003cli\u003e\u003ca href=\"#Q9\"\u003eWhen should subscription customers switch to their perpetual license?\u003c/a\u003e\u003c/li\u003e\n   \u003cli\u003e\u003ca href=\"#Q10\"\u003eHow do I switch to my perpetual license?\u003c/a\u003e\u003c/li\u003e\n   \u003cli\u003e\u003ca href=\"#Q11\"\u003eCan customers with active subscription or maintenance plans log support tickets after February 7, 2018?\u003c/a\u003e\u003c/li\u003e\n   \u003cli\u003e\u003ca href=\"#Q12\"\u003eWhat happens if I need to report a bug before my contract end date?\u003c/a\u003e\u003c/li\u003e\n   \u003cli\u003e\u003ca href=\"#Q13\"\u003eWhat happens to ArtCAM customers with PAF and ELF licenses?\u003c/a\u003e\u003c/li\u003e\n   \u003cli\u003e\u003ca href=\"#Q14\"\u003eWho should customers contact for more information?\u003c/a\u003e\u003c/li\u003e\n  \u003c/ul\u003e &nbsp; \n  \u003ch3 id=\"Q1\"\u003eWhat is happening to ArtCAM?\u003c/h3\u003e\n  \u003cp\u003eAs of&nbsp;July 7, 2018, ArtCAM has been discontinued with no planned future releases or updates. New ArtCAM subscriptions will be removed from all Autodesk price lists, including e-stores.\u003c/p\u003e\n  \u003cp\u003eArtCAM subscription or maintenance plans renewals ended on&nbsp;July 7, 2018.\u003c/p\u003e\n  \u003cp\u003eAlthough support for ArtCAM expired on November 1, 2018, customers can continue to access self-service support via the&nbsp;\u003ca href=\"https://knowledge.autodesk.com/support/\" target=\"_blank\"\u003eAutodesk Knowledge Network\u003c/a\u003e (AKN) and peer-to-peer support via the Autodesk Community’s&nbsp;\u003ca href=\"https://forums.autodesk.com/t5/artcam-forum/bd-p/284\" target=\"_blank\"\u003eArtCAM Forum\u003c/a\u003e.\u003c/p\u003e\n  \u003cp\u003eCustomers with active maintenance plans continue to own and have full usage rights for that license in perpetuity.\u003c/p\u003e &nbsp; \n  \u003ch3 id=\"Q2\"\u003eWill there be any more releases of ArtCAM?\u003c/h3\u003e\n  \u003cp\u003eWhile there may be small point release updates for ArtCAM 2018, there will be no ArtCAM 2019 product range.\u003c/p\u003e &nbsp; \n  \u003ch3 id=\"Q3\"\u003eKey Dates\u003c/h3\u003e\n  \u003ctable border=\"1\" cellpadding=\"2\" cellspacing=\"0\"\u003e\n   \u003ctbody\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003eFebruary 7, 2018\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003eEnd of development of ArtCAM\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003eFebruary 7, 2018\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003eEnd of sale of new ArtCAM subscriptions\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003eJuly 7, 2018\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003eEnd of ArtCAM subscription and maintenance plan renewals\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003eNovember 1, 2018\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003eEnd of technical support for ArtCAM\u003c/td\u003e\n    \u003c/tr\u003e\n   \u003c/tbody\u003e\n  \u003c/table\u003e &nbsp; \n  \u003ch3 id=\"Q4\"\u003eCan I subscribe to ArtCAM after February 7, 2018?\u003c/h3\u003e\n  \u003cp\u003eNo. Customers will not be able to purchase new subscriptions for ArtCAM after February 7, 2018.\u003c/p\u003e &nbsp; \n  \u003ch3 id=\"Q5\"\u003eWhat will happen to my ArtCAM perpetual license after February 7, 2018?\u003c/h3\u003e\n  \u003cp\u003eIf you purchased an ArtCAM perpetual license, you will continue to own and have full usage rights for that license. You will also continue to receive technical support for ArtCAM until November 1, 2018 if you are on an active maintenance plan. Although technical support will expire on November 1, 2018, customers can continue to access self-service support via the&nbsp;\u003ca href=\"https://knowledge.autodesk.com/support/\" target=\"_blank\"\u003eAutodesk Knowledge Network\u003c/a\u003e (AKN) and peer-to-peer support via the Autodesk Community’s&nbsp;\u003ca href=\"https://forums.autodesk.com/t5/artcam-forum/bd-p/284\" target=\"_blank\"\u003eArtCAM Forum\u003c/a\u003e.\u003c/p\u003e &nbsp; \n  \u003ch3 id=\"Q6\"\u003eWhat happens when my maintenance plan or subscription expires after February 7, 2018?\u003c/h3\u003e\n  \u003cp\u003eArtCAM subscription and maintenance plan renewals will continue to be available until July 7, 2018.\u003c/p\u003e\n  \u003cp\u003eTechnical support for ArtCAM customers with active subscriptions and maintenance plans will continue until November 1, 2018.\u003c/p\u003e\n  \u003cp\u003eCustomers with active maintenance plans continue to own and have full usage rights for that license in perpetuity, and will continue to receive technical support for ArtCAM until November 1, 2018.&nbsp;&nbsp;After November 1, 2018 they can continue to access self-service support via the&nbsp;\u003ca href=\"https://knowledge.autodesk.com/support/\" target=\"_blank\"\u003eAutodesk Knowledge Network\u003c/a\u003e&nbsp;(AKN) and peer-to-peer support via the Autodesk Community’s&nbsp;\u003ca href=\"https://forums.autodesk.com/t5/artcam-forum/bd-p/284\" target=\"_blank\"\u003eArtCAM Forum\u003c/a\u003e.\u003c/p\u003e\n  \u003cp\u003eAccess to both the Autodesk Manufacturing Data Exchange Utility and the Autodesk Manufacturing Post Processor Utility will be provided with the use of ArtCAM.\u003c/p\u003e &nbsp; \n  \u003ch3 id=\"Q7\"\u003eWhat happens if my ArtCAM subscription is on auto-renewal?\u003c/h3\u003e\n  \u003cp\u003eArtCAM auto-renewal will be disabled on July 7, 2018, and all auto-renewal subscriptions will terminate at the end of their current contract term.\u003c/p\u003e &nbsp; \n  \u003ch3 id=\"Q8\"\u003eWhen will subscription customers receive a complimentary perpetual license?\u003c/h3\u003e\n  \u003cp\u003eCustomers with an active subscription for ArtCAM on February 7, 2018 are eligible for a complimentary non-maintained perpetual license for ArtCAM 2018.\u003c/p\u003e\n  \u003cp\u003eAutodesk will notify all eligible customers by email before July 7, 2018. The new serial number and product key associated with the non-maintained perpetual license will be sent in a separate email, and accessible from the Management tab of their&nbsp;\u003ca href=\"https://manage.autodesk.com/cep/#products-services/all\" target=\"_blank\"\u003eAutodesk Account\u003c/a\u003e.\u003c/p\u003e &nbsp; \n  \u003ch3 id=\"Q9\"\u003eWhen should subscription customers switch to their perpetual license?\u003c/h3\u003e\n  \u003cp\u003eSubscription customers should switch to their complimentary non-maintained perpetual license for ArtCAM 2018 before their subscription term expiry date. This date can be confirmed from the Billing &amp; Orders section of their&nbsp;\u003ca href=\"https://manage.autodesk.com/cep/#orders/subscriptions\" target=\"_blank\"\u003eAutodesk Account\u003c/a\u003e.\u003c/p\u003e\n  \u003cp\u003eWhen switching to the non-maintained perpetual license for ArtCAM 2018, access to technical support from Autodesk and the use of subscription-only functionality in the software is lost. For example,&nbsp;\u003ca href=\"http://help.autodesk.com/view/ARTC/2018/ENU/?guid=GUID-37A48753-02EA-49AF-9896-B225F0A5CDE2\" target=\"_blank\"\u003eShared Views\u003c/a\u003e.\u003c/p\u003e &nbsp; \n  \u003ch3 id=\"Q10\"\u003eHow do I switch to my perpetual license?\u003c/h3\u003e\n  \u003cp\u003eIf your subscription for ArtCAM 2018 has not expired, update to your new serial number and product key, then activate following the instructions in&nbsp;\u003ca href=\"https://knowledge.autodesk.com/customer-service/download-install/activate/find-serial-number-product-key/update-serial-number\" target=\"_blank\"\u003ethis article\u003c/a\u003e from the&nbsp;\u003ca href=\"https://knowledge.autodesk.com/support/\" target=\"_blank\"\u003eAutodesk Knowledge Network\u003c/a\u003e (AKN).\u003c/p\u003e\n  \u003cp\u003eIf your subscription for ArtCAM 2018 has expired:\u003c/p\u003e\n  \u003col\u003e\n   \u003cli\u003eComplete a clean uninstall of ArtCAM 2018 following the instructions given in&nbsp;\u003ca href=\"https://knowledge.autodesk.com/customer-service/download-install/remove-products/clean-uninstall\" target=\"_blank\"\u003ethis article\u003c/a\u003e from the&nbsp;\u003ca href=\"https://knowledge.autodesk.com/support/\" target=\"_blank\"\u003eAutodesk Knowledge Network\u003c/a\u003e (AKN).\u003c/li\u003e\n   \u003cli\u003eReinstall ArtCAM 2018 following the instructions in&nbsp;\u003ca href=\"https://knowledge.autodesk.com/customer-service/download-install/activate/online-activation-registration\" target=\"_blank\"\u003ethis article\u003c/a\u003e from the&nbsp;\u003ca href=\"https://knowledge.autodesk.com/support/\" target=\"_blank\"\u003eAutodesk Knowledge Network\u003c/a\u003e (AKN).\u003c/li\u003e\n   \u003cli\u003eActivate ArtCAM 2018 using your new serial number and product key following the instructions in&nbsp;\u003ca href=\"https://knowledge.autodesk.com/customer-service/download-install/activate/online-activation-registration\" target=\"_blank\"\u003ethis article\u003c/a\u003e from the&nbsp;\u003ca href=\"https://knowledge.autodesk.com/support/\" target=\"_blank\"\u003eAutodesk Knowledge Network\u003c/a\u003e (AKN).\u003c/li\u003e\n  \u003c/ol\u003e &nbsp; \n  \u003ch3 id=\"Q11\"\u003eCan customers with active subscription or maintenance plans log support tickets after February 7, 2018?\u003c/h3\u003e\n  \u003cp\u003eYes. After February 7, 2018, customers with an active ArtCAM subscription or maintenance plan can follow the usual process of obtaining support by going to their&nbsp;\u003ca href=\"https://accounts.autodesk.com/\" target=\"_blank\"\u003eAutodesk account\u003c/a\u003e, logging-in, selecting their ArtCAM product from the Support section, and then submitting a ticket via email. Although this option will expire on November 1, 2018, customers can continue to access self-service support via the&nbsp;\u003ca href=\"https://knowledge.autodesk.com/support/\" target=\"_blank\"\u003eAutodesk Knowledge Network\u003c/a\u003e (AKN) and peer-to-peer support via the Autodesk Community’s&nbsp;\u003ca href=\"https://forums.autodesk.com/t5/artcam-forum/bd-p/284\" target=\"_blank\"\u003eArtCAM Forum\u003c/a\u003e.\u003c/p\u003e &nbsp; \n  \u003ch3 id=\"Q12\"\u003eWhat happens if I need to report a bug before my contract end date?\u003c/h3\u003e\n  \u003cp\u003eBug reports will continue to be assessed for severity, but there are no plans to continue to update ArtCAM 2018 after February 7, 2018 with either bug fixes or new features. As a result, most bug reports are unlikely to be acted upon, although this will depend on the nature and severity of the problem reported.\u003c/p\u003e &nbsp; \n  \u003ch3 id=\"Q13\"\u003eWhat happens to ArtCAM customers with PAF and ELF licenses?\u003c/h3\u003e\n  \u003cp\u003eCustomers with PAF and ELF licenses that have active maintenance plans after February 7, 2018 will continue to receive technical support for ArtCAM until November 1, 2018.\u003c/p\u003e\n  \u003cp\u003eAll support for these licenses will be handled on the Autodesk Community’s&nbsp;\u003ca href=\"https://forums.autodesk.com/t5/artcam-forum/bd-p/284\" target=\"_blank\"\u003eArtCAM Forum\u003c/a\u003e and via&nbsp;\u003ca href=\"mailto:artcam-online-support@autodesk.com\" target=\"_blank\"\u003eartcam-online-support@autodesk.com\u003c/a\u003e.\u003c/p\u003e &nbsp; \n  \u003ch3 id=\"Q14\"\u003eWho should customers contact for more information?\u003c/h3\u003e\n  \u003cp\u003eFor more information please contact&nbsp;\u003ca href=\"mailto:artcam.support@autodesk.com\" target=\"_blank\"\u003eartcam.support@autodesk.com\u003c/a\u003e.\u003c/p\u003e\n \u003c/div\u003e\n \u003cdiv id=\"products\" class=\"adskkb_products\"\u003e\n  \u003ch3\u003eProducts:\u003c/h3\u003e ArtCAM;\n \u003c/div\u003e\n \u003cdiv id=\"versions\" class=\"adskkb_versions\"\u003e\n  \u003ch3\u003eVersions:\u003c/h3\u003e 2018;\n \u003c/div\u003e\n\u003c/div\u003e\u003c/div\u003e","publisher":"Autodesk","language":"english","lastUpdateDate":"2020-04-11 00:00:00","contentUrl":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/Autodesk-ArtCAM-Software-End-of-Sale-End-of-Development-FAQs.html","subSource":"FaqArticle","caasKey":"caas/sfdcarticles/sfdcarticles/Autodesk-ArtCAM-Software-End-of-Sale-End-of-Development-FAQs.html","sfdcId":"kA93g0000000WFO"
