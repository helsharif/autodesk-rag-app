{"locale":"nl-BE","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/ReCap-Photo-Frequently-Asked-Questions.html"},{"locale":"nl-NL","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/ReCap-Photo-Frequently-Asked-Questions.html"},{"locale":"no-NO","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/ReCap-Photo-Frequently-Asked-Questions.html"},{"locale":"pl-PL","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/ReCap-Photo-Frequently-Asked-Questions.html"},{"locale":"pt-PT","url":"https://www.autodesk.com.br/support/technical/article/caas/sfdcarticles/sfdcarticles/ReCap-Photo-Frequently-Asked-Questions.html"},{"locale":"sv-SE","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/ReCap-Photo-Frequently-Asked-Questions.html"},{"locale":"tr-TR","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/ReCap-Photo-Frequently-Asked-Questions.html"},{"locale":"zh-TW","url":"https://www.autodesk.com.cn/support/technical/article/caas/sfdcarticles/sfdcarticles/ReCap-Photo-Frequently-Asked-Questions.html"}]},"loadAA":true,"pageType":"caas"},"productData":{"productDocumentation":{},"bannerBoxData":{},"recommendationLoading":false,"recommendedContent":[],"customContentLoading":false,"error":{"errorType":null,"errorMetaData":null},"productSlug":"","browseTypes":[],"generalTopics":"","contactSupport":""},"caasData":{"request":{"origin":"upi","key":"caas/sfdcarticles/sfdcarticles/ReCap-Photo-Frequently-Asked-Questions.html","locale":"en-US"},"response":{"source":"sfdcarticles","url":"http://help.autodesk.com.s3.amazonaws.com/sfdcarticles/ReCap-Photo-Frequently-Asked-Questions","shortDescription":"Autodesk ReMake is no longer available as a stand-alone subscription as of September 7, 2017, and is replaced by ReCap Photo. ReCap Photo is available through a subscription to ReCap Pro. Current ReMake Pro subscribers can continue to use ReMake until the end of their current contract. However, the photo-to-3D cloud service is only available with Recap Photo starting December 1, 2017","title":"ReCap Photo Frequently Asked Questions","publishDate":"2023-10-08 00:00:00","contentGroup":["Learn & Explore"],"topicId":"kA93g0000000QIx","caasContent":"\u003cdiv id=\"sfdcarticles\" class=\"caas_sf\"\u003e\u003cdiv id=\"sfdcarticles\" class=\"caas_sf\"\u003e\n \u003cdiv id=\"issue\" class=\"adskkb_issues\"\u003e\n  \u003ch3\u003eIssue:\u003c/h3\u003e\n  \u003cp\u003eAutodesk ReMake is no longer available as a stand-alone subscription as of September 7, 2017, and is replaced by ReCap Photo. ReCap Photo is available through a subscription to ReCap Pro.\u003cbr\u003eCurrent ReMake Pro subscribers can continue to use ReMake until the end of their current contract. However, the photo-to-3D cloud service is only available with Recap Photo starting December 1, 2017.\u003c/p\u003e\n \u003c/div\u003e\n \u003cdiv id=\"solution\" class=\"adskkb_solution\"\u003e\n  \u003ch3\u003eSolution:\u003c/h3\u003e\n  \u003cp\u003e\u003ca href=\"#1\"\u003eWhat’s happening to ReMake?\u003c/a\u003e\u003cbr\u003e\u003ca href=\"#3\"\u003eWhat is ReCap Photo?\u003c/a\u003e\u003cbr\u003e\u003ca href=\"#5\"\u003eWhat are the differences between ReMake and ReCap Photo?\u003c/a\u003e\u003cbr\u003e\u003ca href=\"#4\"\u003eHow do I get ReCap Photo?\u003c/a\u003e\u003cbr\u003e\u003ca href=\"#6\"\u003eIs the photo-to-3D cloud service being impacted?\u003c/a\u003e\u003cbr\u003e\u003ca href=\"#7\"\u003eCan I still use my free ReMake and for how long?\u003c/a\u003e\u003cbr\u003e\u003ca href=\"#8\"\u003eHow much does ReCap Photo cost?\u003c/a\u003e\u003cbr\u003e\u003ca href=\"#9\"\u003eCan I try ReCap Photo for free?\u003c/a\u003e\u003cbr\u003e\u003ca href=\"#10\"\u003eI am an EDU user, what can I do with ReCap Photo?\u003c/a\u003e\u003cbr\u003e\u003ca href=\"#11\"\u003eWhat type of file formats can I create with ReCap Photo?\u003c/a\u003e\u003cbr\u003e\u003ca href=\"#12\"\u003eWhat companion Autodesk software do you recommend for ReCap Photo?\u003c/a\u003e\u003cbr\u003e\u003ca href=\"#13\"\u003eCan I combine laser scans with drone or UAV data?\u003c/a\u003e\u003cbr\u003e\u003ca href=\"#14\"\u003eCan I use Ground Control Points (GCPs) with ReCap Photo?\u003c/a\u003e\u003cbr\u003e\u003ca href=\"#15\"\u003eCan I set and change coordinate systems with ReCap Photo?\u003c/a\u003e\u003cbr\u003e\u003ca href=\"#16\"\u003eHow accurate is the data produced with ReCap Photo?\u003c/a\u003e\u003c/p\u003e\n  \u003cp\u003e\u003cbr\u003e\u003cstrong\u003eWhat’s happening to ReMake?\u003c/strong\u003e\u003cbr\u003eAutodesk ReMake is no longer available as a stand-alone subscription starting September 7, 2017 and is replaced by ReCap Photo, available through a subscription to \u003ca href=\"https://www.autodesk.com/products/recap/subscribe?plc=RECAP&amp;term=1-YEAR&amp;support=ADVANCED&amp;quantity=1\" target=\"_blank\"\u003eRecap Pro\u003c/a\u003e.\u003cbr\u003eCurrent ReMake Pro subscribers can continue to use ReMake until the end of their current contract. However, the photo-to-3D cloud service is only available in Recap Photo starting December 1, 2017.\u003c/p\u003e\n  \u003cp\u003e\u003cstrong\u003eWhat is ReCap Photo?\u003c/strong\u003e\u003cbr\u003eReCap Photo is a cloud-connected app with advanced features to generate geo-located textured meshes, point clouds, and ortho-photos. It also has powerful tools for mesh viewing and editing.\u003c/p\u003e\n  \u003cp\u003e\u003cstrong\u003eWhat are the differences between ReMake and ReCap Photo?\u003c/strong\u003e\u003cbr\u003eReMake was developed to reconstruct and process photo-based 3D models of objects. In addition to the existing features of ReMake, ReCap Photo has new features to serve UAV and drone workflows for the Architecture, Engineering, and Construction (AEC) industry. These features include:\u003c/p\u003e\n  \u003cul\u003e\n   \u003cli\u003eSet GCPs (Ground Control Points, survey points) in any coordinate system.\u003c/li\u003e\n   \u003cli\u003eProcess up to 1,000 photos for aerial reconstructions and up to 300 photos for object reconstructions with a new photogrammetry engine.\u003c/li\u003e\n   \u003cli\u003eOptimized processing of oblique and nadir photos (photos taken by drones and UAVs at 90 degrees above the site).\u003c/li\u003e\n  \u003c/ul\u003e\n  \u003cp\u003eGo to the \u003ca href=\"https://help.autodesk.com/view/RECAP/ENU/?guid=RealityCapture_Photo_product_overview_html\" target=\"_blank\"\u003eReCap Photo site\u003c/a\u003e to see a list of everything that is included.\u003c/p\u003e\n  \u003cp\u003e\u003cstrong\u003eNote:\u003c/strong\u003e ReCap Photo does not support local computations.\u003c/p\u003e\n  \u003cp\u003e\u003cstrong\u003eHow do I get ReCap Photo?\u003c/strong\u003e\u003cbr\u003eReCap Photo is available through a subscription to \u003ca href=\"https://www.autodesk.com/products/recap/subscribe?plc=RECAP&amp;term=1-YEAR&amp;support=ADVANCED&amp;quantity=1\" target=\"_blank\"\u003eReCap Pro\u003c/a\u003e for the same price as ReMake.\u003cbr\u003eReCap Photo and ReCap Pro desktop apps install through a single installation process.\u003c/p\u003e\n  \u003cp\u003e\u003cstrong\u003eTo access ReCap Photo:\u003c/strong\u003e\u003c/p\u003e\n  \u003col\u003e\n   \u003cli\u003eSign in to your \u003ca href=\"http://manage.autodesk.com/\" target=\"_blank\"\u003eAutodesk Account\u003c/a\u003e&nbsp;and go to All Products &amp; Services.\u003c/li\u003e\n   \u003cli\u003eSelect the latest ReCap Pro version and click \u003cstrong\u003eView downloads\u003c/strong\u003e.\u003c/li\u003e\n   \u003cli\u003eThe ReCap Pro installer&nbsp;installs both ReCap Pro and ReCap Photo desktop apps.\u003c/li\u003e\n  \u003c/ol\u003e\n  \u003cp\u003e\u003cstrong\u003eIs the photo-to-3D cloud service impacted?\u003c/strong\u003e\u003cbr\u003eYes, in several ways:\u003c/p\u003e\n  \u003cul\u003e\n   \u003cli\u003eStarting December 1, 2017, the only way to access the service is through&nbsp;ReCap Photo which requires a \u003ca href=\"https://www.autodesk.com/products/recap/subscribe?plc=RECAP&amp;term=1-YEAR&amp;support=ADVANCED&amp;quantity=1\" target=\"_blank\"\u003eReCap Pro\u003c/a\u003e subscription.\u003c/li\u003e\n   \u003cli\u003e\u003cp\u003eAs of April 14, 2021, 3D photo reconstruction job pricing in ReCap Photo is being amended from its current 3-tiered model to a simpler multi-tiered model. Cost of jobs will continue to be determined by the number of photos processed. As of April 14, 2021, this is the new multi-tiered pricing:\u003c/p\u003e\n    \u003ctable border=\"1\" cellpadding=\"1\" cellspacing=\"1\"\u003e\n     \u003cthead\u003e\n      \u003ctr\u003e\n       \u003cth colspan=\"1\" rowspan=\"1\"\u003ePrice per 50 photos processed\u003c/th\u003e\n       \u003cth colspan=\"1\" rowspan=\"1\"\u003eExample: Cost of a 140 photo job\u003c/th\u003e\n      \u003c/tr\u003e\n     \u003c/thead\u003e\n     \u003ctbody\u003e\n      \u003ctr\u003e\n       \u003ctd colspan=\"1\" rowspan=\"1\"\u003e1 token\u003c/td\u003e\n       \u003ctd colspan=\"1\" rowspan=\"1\"\u003e3 Flex tokens\u003c/td\u003e\n      \u003c/tr\u003e\n     \u003c/tbody\u003e\n    \u003c/table\u003e \u003cp\u003e\u003cstrong\u003eNote\u003c/strong\u003e: The maximum number of photos that can be processed in one job remains unchanged at 1,000 for aerial reconstruction.\u003c/p\u003e \u003cp\u003eUpdating the consumption of Flex tokens through usage of ReCap Photo as such gives customers more flexibility in determining the quality setting desired and enables more economical consumption of tokens.\u003c/p\u003e\u003c/li\u003e\n  \u003c/ul\u003e\n  \u003cp\u003e\u003cstrong\u003eNote: \u003c/strong\u003eThe reconstruction process requires a minimum of 20 photos imported per job.\u003c/p\u003e\n  \u003cp\u003e\u003cstrong\u003eCan I still use my free ReMake and for how long?\u003c/strong\u003e\u003cbr\u003eYes, you can continue to use ReMake for a short time. Starting December 1, 2017, the only way to access the photo-to-3D cloud service will be through ReCap Photo, available through a subscription to \u003ca href=\"https://www.autodesk.com/content/autodesk/global/en/products/recap/overview\" target=\"_blank\"\u003eReCap Pro\u003c/a\u003e .\u003c/p\u003e\n  \u003cp\u003e\u003cstrong\u003eHow much does ReCap Photo cost?\u003c/strong\u003e\u003cbr\u003eYou can get ReCap Photo by subscribing to \u003ca href=\"https://www.autodesk.com/products/recap/subscribe?plc=RECAP&amp;term=1-YEAR&amp;support=ADVANCED&amp;quantity=1\" target=\"_blank\"\u003eReCap Pro\u003c/a\u003e&nbsp;on a monthly, 1-year, or 3-year plan. For exact pricing, talk to your Autodesk reseller or visit the&nbsp;\u003ca href=\"https://www.autodesk.com/store\" target=\"_blank\"\u003eAutodesk Store\u003c/a\u003e.\u003cbr\u003e\u003cbr\u003e\u003cstrong\u003eNote:\u003c/strong\u003e ReCap Pro annual and multi-year subscriptions \u003cem\u003edo not include\u003c/em\u003e&nbsp;tokens. Flex tokens can be purchased from Autodesk Resellers or the \u003ca href=\"https://www.autodesk.com/store\" target=\"_blank\"\u003eAutodesk Store\u003c/a\u003e.\u003c/p\u003e\n  \u003cp\u003e\u003cstrong\u003eCan I try ReCap Photo for free?\u003c/strong\u003e\u003cbr\u003eReCap Photo has many mesh viewing, editing and export features that are available for free without a subscription. 3D photo reconstruction requires a subscription to ReCap Pro, Autodesk Drive cloud storage (which comes with the ReCap Pro subscription), and Flex tokens. There is no Trial mode for ReCap Photo. Please refer to the table below for a detailed comparison:\u003c/p\u003e\n  \u003ctable border=\"1\" style=\"width: 500px;\"\u003e\n   \u003cthead\u003e\n    \u003ctr\u003e\n     \u003cth colspan=\"1\" rowspan=\"1\"\u003eReCap Photo Features\u003c/th\u003e\n     \u003cth colspan=\"1\" rowspan=\"1\"\u003eFree\u003c/th\u0 rowspan=\"1\"\u003e&nbsp;\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cspan style=\"font-size: 11.0pt;\"\u003e\u003cspan style=\"line-height: 107%;\"\u003e\u003cspan style=\"font-family: &quot;Calibri&quot;,sans-serif;\"\u003e\u003cspan style=\"color: black;\"\u003e√\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\n      \u003cdiv style=\"margin-left: 40px;\"\u003e\n       - Run multiple projects in parallel\n      \u003c/div\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e&nbsp;\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cspan style=\"font-size: 11.0pt;\"\u003e\u003cspan style=\"line-height: 107%;\"\u003e\u003cspan style=\"font-family: &quot;Calibri&quot;,sans-serif;\"\u003e\u003cspan style=\"color: black;\"\u003e√\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003c/td\u003e\n    \u003c/tr\u003e\n   \u003c/tbody\u003e\n  \u003c/table\u003e\n  \u003cp\u003e\u003cbr\u003e\u003cstrong\u003eI am an EDU user, what can I do with ReCap Photo?\u003c/strong\u003e\u003cbr\u003eAs an EDU user, you get&nbsp;ReCap Pro and ReCap Photo desktop apps free. You are, however,&nbsp;limited to 100 photos per project&nbsp;for cloud processing.\u003c/p\u003e\n  \u003cp\u003e\u003cstrong\u003eWhat type of file formats can I create with ReCap Photo?\u003c/strong\u003e\u003cbr\u003eReCap Photo produces the following files from drone and UAV photos:\u003c/p\u003e\n  \u003cul\u003e\n   \u003cli\u003eGeolocated orthographic view (and its elevation map) of the site in GeoTIFF format\u003c/li\u003e\n   \u003cli\u003eGeolocated 3D point cloud in RCS (Autodesk point cloud format)\u003c/li\u003e\n   \u003cli\u003eGeolocated 3D photo-textured mesh in RCM (Autodesk high-resolution mesh format)\u003c/li\u003e\n  \u003c/ul\u003e\n  \u003cp\u003eThrough the \u003cstrong\u003eReCap Pro desktop app\u003c/strong\u003e, you can edit your RCS point cloud and export it to other formats (E57, PTS, PTG).\u003cbr\u003eThrough the \u003cstrong\u003eReCap Photo desktop app\u003c/strong\u003e, you can edit&nbsp;RCM&nbsp;meshes (including healing tools) and export it in other sizes, with decimation, and other formats (OBJ, FBX, Quads, STL).\u003cbr\u003eThrough \u003cstrong\u003eReCap web\u003c/strong\u003e, you can:\u003c/p\u003e\n  \u003cul\u003e\n   \u003cli\u003eView a light version of your 3D photo-textured mesh.\u003c/li\u003e\n   \u003cli\u003eView the geolocated orthographic view, zoom in and out, and add measurements, tags, and annotations.\u003c/li\u003e\n   \u003cli\u003eShare the mesh with anyone and include extra metadata (measurements, tags, and annotations).\u003c/li\u003e\n  \u003c/ul\u003e\n  \u003cp\u003e\u003cstrong\u003eWhat companion Autodesk software do you recommend for ReCap Photo?\u003c/strong\u003e\u003cbr\u003eFor orthographic views in GeoTIFF, we recommend Autodesk \u003ca href=\"https://www.autodesk.com/products/infraworks/overview\" target=\"_blank\"\u003eInfraworks\u003c/a\u003e, \u003ca href=\"https://www.autodesk.com/products/autocad-civil-3d/overview\" target=\"_blank\"\u003eAutoCAD Civil 3D\u003c/a\u003e, or any other GIS software to create measurements and overlay drawings or CAD models.\u003cbr\u003e\u003cstrong\u003eRCS point clouds \u003c/strong\u003ecan be imported into any Autodesk software for design, such as \u003ca href=\"https://www.autodesk.com/products/revit-family/overview\" target=\"_blank\"\u003eRevit\u003c/a\u003e, \u003ca href=\"https://www.autodesk.com/products/autocad/overview\" target=\"_blank\"\u003eAutoCAD\u003c/a\u003e, \u003ca href=\"https://www.autodesk.com/products/navisworks/overview\" target=\"_blank\"\u003eNavisworks\u003c/a\u003e, \u003ca href=\"https://www.autodesk.com/products/autocad-civil-3d/overview\" target=\"_blank\"\u003eCivil 3D\u003c/a\u003e, or \u003ca href=\"https://www.autodesk.com/products/infraworks/overview\" target=\"_blank\"\u003eInfraWorks\u003c/a\u003e.\u003cbr\u003e\u003cbr\u003e\u003cstrong\u003e3D Meshes&nbsp;\u003c/strong\u003ecan be imported in \u003ca href=\"https://www.autodesk.com/products/3ds-max/overview\" target=\"_blank\"\u003e3ds Max\u003c/a\u003e or \u003ca href=\"https://www.autodesk.com/products/stingray/overview\" target=\"_blank\"\u003eStingray\u003c/a\u003e after being edited and exported from ReCap Photo in FBX or OBJ.\u003c/p\u003e\n  \u003cp\u003e\u003cstrong\u003eCan I combine laser scans with drone or UAV data?\u003c/strong\u003e\u003cbr\u003eYou can merge laser scan point clouds with UAV-based point clouds with ReCap Pro desktop app and ReCap Photo. This is useful for appending your laser scans with drone data for areas that are difficult to reach, such as rooftops. To merge the data, match visual features that appear in both point clouds or use the same survey points in each registration and stitching process. The ReCap Pro desktop app includes the necessary user interface for this visual matching and automatically chooses the best fit to align the two point clouds.\u003c/p\u003e\n  \u003cp\u003e\u003cstrong\u003eCan I use Ground Control Points (GCPs) with ReCap Photo?\u003c/strong\u003e\u003cbr\u003eYes, ReCap Photo includes all the necessary UI components to import your GCPs into any coordinate system. Each GCP must be visually matched with at least four&nbsp;photos. The GCPs are used to enhance accuracy. If you don’t add GCPs, the geolocation and scale of your scene are computed from the GPS information attached to each photo.\u003c/p\u003e\n  \u003cp\u003e\u003cstrong\u003eCan I set and change coordinate systems with ReCap Photo?\u003c/strong\u003e\u003cbr\u003eYes, ReCap Photo now supports the standard geographic coordinate system used across all Autodesk products like \u003ca href=\"https://www.autodesk.com/products/autocad-civil-3d/overview\" target=\"_blank\"\u003eCivil 3D\u003c/a\u003e and \u003ca href=\"https://www.autodesk.com/products/infraworks/overview\" target=\"_blank\"\u003eInfraWorks\u003c/a\u003e, which allows the following:\u003c/p\u003e\n  \u003cul\u003e\n   \u003cli\u003eGCPs to be specified in spherical coordinate systems like WGS84 and projected coordinate systems like UTM and State Plane.\u003c/li\u003e\n   \u003cli\u003eTarget coordinate system for the outputs (orthophoto/mesh/point cloud) to be specified in projected coordinate systems like UTM and State Plane.\u003c/li\u003e\n  \u003c/ul\u003e\n  \u003cp\u003e\u003cstrong\u003eHow accurate is the data produced with ReCap Photo?\u003c/strong\u003e\u003cbr\u003eReconstruction is accurate within ±1 pixel of the input images. Accuracy and resolution rely on the ground sampling distance in the images and other image capture variables like the quality of the camera and lens system, camera shake, focus, and deviation information&nbsp;for each input Ground Control Point.\u003c/p\u003e\n \u003c/div\u003e\n \u003cdiv id=\"seealso\" class=\"adskkb_seealso\"\u003e\n  \u003ch3\u003eSee Also:\u003c/h3\u003e\u003ca href=\"https://www.autodesk.com/flexratesheet-ppr\" target=\"_blank\"\u003eFlex rates for pay-per-result cloud services\u003c/a\u003e\u003cbr\u003e&nbsp;\n \u003c/div\u003e\n \u003cdiv id=\"products\" class=\"adskkb_products\"\u003e\n  \u003ch3\u003eProducts:\u003c/h3\u003e ReCap;\n \u003c/div\u003e\n\u003c/div\u003e\u003c/div\u003e","publisher":"Autodesk","language":"english","releaseYear":"2024","lastUpdateDate":"2023-10-08 00:00:00","contentUrl":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/ReCap-Photo-Frequently-Asked-Questions.html","subSource":"FaqArticle","caasKey":"caas/sfdcarticles/sfdcarticles/ReCap-Photo-Frequently-Asked-Questions.html","sfdcId":"kA93g0000000QIx","upiLanguage":"ENU","productRelease":["ReCap 2020","ReCap 2021","ReCap 2022","ReCap 2019","ReCap 2023","ReCap 2024"],"productLine":["Media & Entertainment Collection","Architecture Engineering & C
