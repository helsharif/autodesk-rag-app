nical/article/caas/tsarticles/ts/1M8HMZJKuBRw9cnzLLza5l.html"},{"locale":"fr-BE","url":"https://www.autodesk.fr/support/technical/article/caas/tsarticles/ts/1M8HMZJKuBRw9cnzLLza5l.html"},{"locale":"fr-CA","url":"https://www.autodesk.fr/support/technical/article/caas/tsarticles/ts/1M8HMZJKuBRw9cnzLLza5l.html"},{"locale":"fr-CH","url":"https://www.autodesk.fr/support/technical/article/caas/tsarticles/ts/1M8HMZJKuBRw9cnzLLza5l.html"},{"locale":"hu-HU","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/1M8HMZJKuBRw9cnzLLza5l.html"},{"locale":"it-CH","url":"https://www.autodesk.it/support/technical/article/caas/tsarticles/ts/1M8HMZJKuBRw9cnzLLza5l.html"},{"locale":"nl-BE","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/1M8HMZJKuBRw9cnzLLza5l.html"},{"locale":"nl-NL","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/1M8HMZJKuBRw9cnzLLza5l.html"},{"locale":"no-NO","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/1M8HMZJKuBRw9cnzLLza5l.html"},{"locale":"pl-PL","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/1M8HMZJKuBRw9cnzLLza5l.html"},{"locale":"pt-PT","url":"https://www.autodesk.com.br/support/technical/article/caas/tsarticles/ts/1M8HMZJKuBRw9cnzLLza5l.html"},{"locale":"sv-SE","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/1M8HMZJKuBRw9cnzLLza5l.html"},{"locale":"tr-TR","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/1M8HMZJKuBRw9cnzLLza5l.html"},{"locale":"zh-TW","url":"https://www.autodesk.com.cn/support/technical/article/caas/tsarticles/ts/1M8HMZJKuBRw9cnzLLza5l.html"}]},"loadAA":true,"pageType":"caas"},"productData":{"productDocumentation":{},"bannerBoxData":{},"recommendationLoading":false,"recommendedContent":[],"customContentLoading":false,"error":{"errorType":null,"errorMetaData":null},"productSlug":"","browseTypes":[],"generalTopics":"","contactSupport":""},"caasData":{"request":{"origin":"upi","key":"caas/tsarticles/ts/1M8HMZJKuBRw9cnzLLza5l.html","locale":"en-US"},"response":{"source":"tsarticles","url":"https://help.autodesk.com/ts/1M8HMZJKuBRw9cnzLLza5l","shortDescription":"Overview Starting August 7, 2021, standalone subscriptions of Autodesk Character Generator software will no longer be available for purchase. However, you can continue to gain access to Character Generator as part of an Autodesk Maya, Autodesk Maya LT, Autodesk 3ds Max, Autodesk MotionBuilder, Autodesk Mudbox software, and Autodesk Media & Entertainment Collection subscription entitlement","title":"Changes to Character Generator - Questions and Answers","publishDate":"2022-02-10 00:00:00","contentGroup":["Installation & Deployment","Troubleshooting"],"topicId":"1M8HMZJKuBRw9cnzLLza5l","caasContent":"\u003cdiv id=\"tsarticles\" class=\"caas_ts\"\u003e\u003ch2\u003eOverview&nbsp;\u003c/h2\u003e\n\n\u003cp\u003eStarting August 7, 2021, standalone subscriptions of Autodesk&nbsp;Character Generator software will no longer be available for purchase. However, you can continue to gain access to Character Generator as part of an Autodesk&nbsp;Maya, Autodesk&nbsp;Maya LT, Autodesk 3ds Max, Autodesk&nbsp;MotionBuilder, Autodesk&nbsp;Mudbox&nbsp;software, and Autodesk&nbsp;Media &amp; Entertainment Collection subscription entitlement.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eImportant Update (February 2022)\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eOn March 22, 2022, Autodesk Character Generator software is moving to the Autodesk Forge platform. As part of this change, all assets previously created in Character Generator will not migrate. Customers will need to download their previously created characters before this date to avoid permanently losing their assets.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, active Character Generator subscribers and customers using Character Generator as part of their Autodesk Maya, Autodesk 3ds Max, Autodesk Maya LT, Autodesk MotionBuilder, Autodesk Mudbox, and Autodesk Media &amp; Entertainment Collection subscription entitlement will no longer require cloud credit consumption for premium characters making the asset creation tool completely free for the above-mentioned products.\u003c/p\u003e\n\n\u003chr /\u003e\n\u003ch2\u003eQuestions and Answers\u003c/h2\u003e\n\n\u003ch3\u003e1. What is happening to Character Generator?\u003c/h3\u003e\n\n\u003cp\u003eAs of August 7, 2021, you will no longer be able to purchase new standalone licenses nor renew your existing subscription to Character Generator.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eImportant Update (February 2022)\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eOn March 22, 2022, Character Generator is moving to the Forge platform. As part of this change, assets previously created in Character Generator will not migrate to the Forge platform. Additionally, generating and downloading premium characters in Character Generator will no longer require cloud credit consumption.\u003c/p\u003e\n\n\u003ch3\u003e&nbsp;\u003c/h3\u003e\n\n\u003ch3\u003e2. How will these changes affect me?\u003c/h3\u003e\n\n\u003cp\u003eIf you have an active standalone Character Generator subscription, you will be able to continue using it until the end of your contract term. After August 7, 2021, you will no longer be able to renew your subscription.&nbsp;\u003c/p\u003e\n\n\u003cp\u003eIf you still want access to Character Generator after this date, you will be able to access it through a subscription to Maya, Maya LT, 3ds Max, Mudbox, MotionBuilder, and/or the Media &amp; Entertainment Collection. Where applicable, these offerings are available on the Autodesk e-store or through local resellers.\u003c/p\u003e\n\n\u003cp\u003eIf you have an existing subscription to Maya, Maya LT, 3ds Max, MotionBuilder, Mudbox, or the Media &amp; Entertainment Collection, you will still have access to Character Generator as part of your subscription entitlement.&nbsp;\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eImportant Update (February 2022)\u003c/strong\u003e\u003cbr /\u003e\nCustomers will need to download their previously created characters from Character Generator to avoid permanently losing them as they will not migrate to the Forge platform.&nbsp;\u003c/p\u003e\n\n\u003cp\u003eCustomers will no longer require cloud credits to generate or download premium characters in Character Generator. The asset creation tool will therefore be available for free to active Character Generator subscribers and customers using Character Generator as part of the Maya, 3ds Max, Maya LT, MotionBuilder, Mudbox, and Media &amp; Entertainment Collection subscription entitlement.&nbsp;\u003c/p\u003e\n\n\u003ch3\u003e&nbsp;\u003c/h3\u003e\n\n\u003ch3\u003e3. What are my options if I still want access to Character Generator after August 7, 2021?\u003c/h3\u003e\n\n\u003cp\u003eYou will need to subscribe to Maya, Maya LT, 3ds Max, Mudbox, MotionBuilder, or the Media &amp; Entertainment Collection to get access to Character Generator as part of your subscription entitlement. Visit \u003ca href=\"http://www.autodesk.com/\"\u003ewww.autodesk.com\u003c/a\u003e for more information on pricing.\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003ch3\u003e4. Will my e-store subscription of Character Generator continue to auto-renew after August 7, 2021?\u003c/h3\u003e\n\n\u003cp\u003eNo, e-store subscriptions of Character Generator will not continue to auto-renew past August 7, 2021. You will lose access to Character Generator at the end of your contract term.\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003ch3\u003e5. I am not currently subscribed to Maya, Maya LT, 3ds Max, Mudbox, MotionBuilder, or the Media &amp; Entertainment Collection, but I have a standalone subscription of Character Generator. Are there any requirements for me to transfer my data to a new subscription of a qualified product?\u003c/h3\u003e\n\n\u003cp\u003eNo, there are no requirements for you to transfer your data. You will be able to access your content as before.\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003ch3\u003e6. How will these changes affect my educational license?\u003c/h3\u003e\n\n\u003cp\u003eAs of August 7, 2021, Character Generator will not be available as a standalone product for individual students and educators but will remain available for educational institutions and students via Maya, Maya LT, 3ds Max, Mudbox, and MotionBuilder.\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003ch3\u003e7. Will I still have access to Character Generator's premium content?\u003c/h3\u003e\n\n\u003cp\u003eIf you are subscribed to Maya, Maya LT, 3ds Max, MotionBuilder, Mudbox, or the Media &amp; Entertainment Collection, you can use any of the Character Generator premium content and download your customized characters provided you have the required amount of Cloud Credits. Cloud Credits will need to be purchased \u003cu\u003eseparately \u003c/u\u003eto use the in-product premium content.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eImportant Update (February 2022)\u003c/strong\u003e\u003cbr /\u003e\nCustomers will no longer require cloud credits to generate or download premium characters in Character Generator. The asset creation tool will therefore be available for free to active Character Generator subscribers and customers using Character Generator as part of their Maya, 3ds Max, Maya LT, MotionBuilder, Mudbox, and Media &amp; Entertainment Collection subscription entitlement.\u003cbr /\u003e\n&nbsp;\u003c/p\u003e\n\n\u003ch3\u003e8. How can I purchase Cloud Credits?\u003c/h3\u003e\n\n\u003cp\u003eCloud Credits can be purchased in your Autodesk Account.\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003ch3\u003e9. Are there different types of Cloud Credits?\u003c/h3\u003e\n\n\u003cp\u003eYes, there are two types of Cloud Credits: Individual and Shared. Visit \u003ca href=\"https://knowledge.autodesk.com/customer-service/account-management/users-software/reporting/cloud-credits\"\u003eCloud credit reporting\u003c/a\u003e for more information.\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\u003c/div\u003e","publisher":"Autodesk","language":"english","lastUpdateDate":"2022-02-17 00:00:00","contentUrl":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/1M8HMZJKuBRw9cnzLLza5l.html","caasKey":"caas/tsarticles/ts/1M8HMZJKuBRw9cnzLLza5l.html","upiLanguage":"ENU","productLine":["Character Generator"],"nodeId":"1M8HMZJKuBRw9cnzLLza5l","knowledgeSource":"Technical Support","mediaType":["Text Only"],"audience":["User"],"docnUrl":"changes-to-character-generator-questions-and-answers","contactSupport":"\n\n\n\u003cdiv class=\"xfpage-content-container\"\u003e\n  \n  \u003cdiv class=\"root container responsivegrid\"\u003e\n\n    \n    \n    \n    \u003cdiv id=\"container-3acc490818\" class=\"cmp-container\"\u003e\n        \n        \u003cdiv class=\"flexible-text\"\u003e\u003cdiv id=\"flexible-text-106aeb187a\" class=\"pnl-ft dhig-theme--light dhig-py-8\" data-wat-content-type=\"panel\" data-wat-content-name=\"flexible text-only\" style=\"background-color: #f9f9f9;\"\u003e\n  \u003cdiv class=\"page-container-wrapper\"\u003e\n    \u003cdiv class=\"page-container\"\u003e\n      \n      \u003cdiv class=\"pnl-ft__heading lg:dhig-w-3/5\"\u003e\n\u003cdiv id=\"title-d8bb64ba85\" class=\"cmp-title\"\u003e\n  \u003ch2 class=\"cmp-title__text dhig-typography-headline-medium\"\u003e\n    Need help? Ask the Autodesk Assistant!\u003c/h2\u003e\n\u003c/div\u003e\n\n    \n\n\u003c/div\u003e\n      \u003cdiv class=\"md:dhig-flex\"\u003e\n        \u003cdiv class=\"lg:dhig-w-3/5 md:dhig-w-2/3\"\u003e\n          \n          \u003cdiv class=\"dhig-mt-2 pnl-ft__subheading\"\u003e\n\u003cdiv id=\"text-f19f35bbbd\" class=\"cmp-text dhig-typography-body-copy-medium\"\u003e\n  \u003cdiv class=\"cmp-text-editable\"\u003
