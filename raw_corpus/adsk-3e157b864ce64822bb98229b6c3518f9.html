ading":false,"error":{"errorType":null,"errorMetaData":null},"productSlug":"","browseTypes":[],"generalTopics":"","contactSupport":""},"caasData":{"request":{"origin":"upi","key":"caas/sfdcarticles/sfdcarticles/Basic-troubleshooting-for-product-download-issues.html","locale":"en-US"},"response":{"source":"sfdcarticles","url":"http://help.autodesk.com.s3.amazonaws.com/sfdcarticles/Basic-troubleshooting-for-product-download-issues","shortDescription":"Can not download Autodesk products. Installation or download fails. Try the following: If you tried to install using Download Now or Install Now, try using the Browser Download method (not available in macOS). Try to download using a different browser, such as Chrome or Explorer. This solves the issue in many cases. Try a wired Internet service connection (instead of wifi). Temporarily enable JavaScript. Temporarily turn off antivirus software, personal firewall, port blocking, or VPN","title":"Troubleshoot Autodesk product download issues","publishDate":"2023-10-08 00:00:00","contentGroup":["Troubleshooting"],"topicId":"kA93g00000002FX","caasContent":"\u003cdiv id=\"sfdcarticles\" class=\"caas_sf\"\u003e\u003cdiv id=\"sfdcarticles\" class=\"caas_sf\"\u003e\n \u003cdiv id=\"issue\" class=\"adskkb_issues\"\u003e\n  \u003ch3\u003eIssue:\u003c/h3\u003e\u003cfont\u003e\u003cfont\u003eCan not download Autodesk products. Installation or download fails.&nbsp;\u003c/font\u003e\u003c/font\u003e\n \u003c/div\u003e\n \u003cdiv id=\"solution\" class=\"adskkb_solution\"\u003e\n  \u003ch3\u003eSolution:\u003c/h3\u003eTry the following: \n  \u003cul\u003e\n   \u003cli\u003eIf you tried to install using Download Now or Install Now, try using the \u003ca href=\"https://knowledge.autodesk.com/customer-service/download-install/download/about-download-methods/browser-download-method-for-autodesk-account?st=browser%20download\" target=\"_blank\"\u003eBrowser Download\u003c/a\u003e method (not available in macOS).\u003c/li\u003e\n   \u003cli\u003e\u003cfont\u003e\u003cfont\u003eTry to download using a different browser, such as Chrome or Explorer.&nbsp;This solves the issue in many cases.\u003c/font\u003e\u003c/font\u003e\u003c/li\u003e\n   \u003cli\u003e\u003cfont\u003e\u003cfont\u003eTry a wired Internet service connection (instead of wifi).\u003c/font\u003e\u003c/font\u003e\u003c/li\u003e\n   \u003cli\u003e\u003cfont\u003e\u003cfont\u003eTemporarily enable JavaScript.\u003c/font\u003e\u003c/font\u003e\u003c/li\u003e\n   \u003cli\u003e\u003cfont\u003e\u003cfont\u003eTemporarily turn off&nbsp;antivirus software, personal firewall, port blocking,&nbsp;or VPN. If you use&nbsp;download-acceleration software or&nbsp;other program that manages downloads), turn that off as well.\u003c/font\u003e\u003c/font\u003e\u003c/li\u003e\n   \u003cli\u003eRemove pop-up blockers, cookies, and temporary Internet files.\u003c/li\u003e\n   \u003cli\u003eContact \u003ca href=\"https://www.autodesk.com/support/contact-support\" target=\"_blank\"\u003eAutodesk Support\u003c/a\u003e.\u003c/li\u003e\n  \u003c/ul\u003e\n  \u003ch4\u003eTo turn off pop-up blockers and clear your cache\u003c/h4\u003e\n  \u003col\u003e\n   \u003cli\u003e\u003cfont\u003e\u003cfont\u003eClose all other windows and tabs in your browser.\u003c/font\u003e\u003c/font\u003e\u003c/li\u003e\n   \u003cli\u003e\u003cfont\u003e\u003cfont\u003eKeep only one window and one tab open.&nbsp;In the Preferences or Options area of your browser, temporarily remove pop-up blockers and allow access to all sites in the&nbsp;\u003cb\u003e*autodesk.com\u003c/b\u003e domain.\u003c/font\u003e\u003c/font\u003e\u003c/li\u003e\n   \u003cli\u003e\u003cfont\u003e\u003cfont\u003eDelete cookies&nbsp;and temporary Internet files (clear the cache).\u003c/font\u003e\u003c/font\u003e\u003c/li\u003e\n   \u003cli\u003e\u003cfont\u003e\u003cfont\u003eClose and reopen your browser.\u003c/font\u003e\u003c/font\u003e\u003c/li\u003e\n  \u003c/ol\u003e\n \u003c/div\u003e\n \u003cdiv id=\"seeals
