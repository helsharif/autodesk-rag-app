\u003c/div\u003e\n \u003cdiv id=\"solution\" class=\"adskkb_solution\"\u003e\n  \u003ch3\u003e\u003c/h3\u003e\n  \u003ctable border=\"1\" cellpadding=\"2\" cellspacing=\"0\"\u003e\n   \u003cthead\u003e\n    \u003ctr\u003e\n     \u003cth colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eCategory\u003c/b\u003e\u003c/th\u003e\n     \u003cth colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eRequirements\u003c/b\u003e\u003c/th\u003e\n    \u003c/tr\u003e\n   \u003c/thead\u003e\n   \u003ctbody\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eHardware\u003c/b\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\n      \u003cul\u003e\n       \u003cli\u003e\u003cb\u003eMinimum\u003c/b\u003e: 2 GHz 64-bit Intel® or AMD® multi-core processor\u003c/li\u003e\n       \u003cli\u003e\u003cb\u003eRecommended\u003c/b\u003e: Intel&nbsp;Core™ / Xeon® processor or AMD&nbsp;Ryzen™ / Ryzen Threadripper™\u003c/li\u003e\n      \u003c/ul\u003e\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eMemory\u003c/b\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\n      \u003cul\u003e\n       \u003cli\u003e8 GB RAM, 16 GB or more recommended\u003c/li\u003e\n      \u003c/ul\u003e\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eGraphics Requirements\u003c/b\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eFor GPU Raytracing\u003c/b\u003e, we recommend the use of the following NVIDIA® driver versions. Larger scenes require 8GB or more GPU memory.\u003cbr\u003e \u003cbr\u003e \u003cb\u003eWindows\u003c/b\u003e NVIDIA driver requirements: \n      \u003cul\u003e\n       \u003cli\u003ev.2024 and 2024.2 require an RTX 516.10 or above\u003c/li\u003e\n      \u003c/ul\u003e \u003cstrong\u003eIMPORTANT\u003c/strong\u003e: To use the new DLSS RR, you will need the NVIDIA driver v.537.02; otherwise, VRED will default to the DLSS from version 2024.1.\u003cbr\u003e \u003cbr\u003e \u003cb\u003eLinux\u003c/b\u003e NVIDIA driver requirements: \n      \u003cul\u003e\n       \u003cli\u003ev.2024 and 2024.1 require an RTX 515.43.04 or above\u003c/li\u003e\n      \u003c/ul\u003e \u003cp\u003e\u003cb\u003eNOTE\u003c/b\u003e: The driver is available under Advanced search on the NVIDIA website \u003ca href=\"https://www.nvidia.com/Download/Find.aspx?lang=en-us\" target=\"_blank\"\u003ehere\u003c/a\u003e.\u003c/p\u003e \u003cp\u003e\u003cb\u003eFor OpenGL\u003c/b\u003e: Supported NVIDIA&nbsp;or AMD graphics card with OpenGL 4.3 support and a certified driver\u003c/p\u003e\n      \u003cul\u003e\n       \u003cli\u003eSee the \u003ca href=\"https://www.autodesk.com/graphics-hardware\" target=\"_blank\"\u003eCertified Hardware\u003c/a\u003e\u003c/li\u003e\n      \u003c/ul\u003e\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eOperating Systems\u003c/b\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\n      \u003cul\u003e\n       \u003cli\u003eMicrosoft® Windows® 11\u003c/li\u003e\n       \u003cli\u003eMicrosoft Windows 10 (64-bit)\u003c/li\u003e\n      \u003c/ul\u003e \u003cstrong\u003eIMPORTANT\u003c/strong\u003e: \n      \u003cul\u003e\n       \u003cli\u003eRed Hat 6.x is not supported as of version 2022\u003c/li\u003e\n       \u003cli\u003eWindows 7 is not supported as of version 2021\u003c/li\u003e\n       \u003cli\u003emacOS is not supported as of version 2019.1\u003c/li\u003e\n      \u003c/ul\u003e \u003cstrong\u003eFor the VRED Render Node and VRED Core\u003c/strong\u003e: \n      \u003cul\u003e\n       \u003cli\u003e\u003cstrong\u003eLinux Version\u003c/strong\u003e: Linux with GNU C Library stable release version 2.17 with installed X-Server&nbsp;\u003cstrong\u003eRed Hat 7.x/8.x\u003c/strong\u003e\u003c/li\u003e\n      \u003c/ul\u003e \u003cstrong\u003eIMPORTANT\u003c/strong\u003e: We recommend updating to Linux RedHat 8, as Linux 7 will not be supported as of version 2025.\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eOther Software\u003c/b\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\n      \u003cul\u003e\n       \u003cli\u003e\u003ca href=\"http://www.adobe.com\" target=\"_blank\"\u003eAdobe® Acrobat® Reader\u003c/a\u003e (required to view PDF documentation provided)\u003c/li\u003e\n       \u003cli\u003eAutodesk recommends the latest version of the following web browsers for access to online supplemental content: \n        \u003cul\u003e\n         \u003cli\u003eApple® Safari®\u003c/li\u003e\n         \u003cli\u003eGoogle® Chrome\u003c/li\u003e\n         \u003cli\u003eMicrosoft Edge\u003c/li\u003e\n         \u003cli\u003eMozilla® Firefox®\u003c/li\u003e\n        \u003c/ul\u003e\u003c/li\u003e\n       \u003cli\u003eAppropriate graphics card driver\u003c/li\u003e\n       \u003cli\u003eDriver software for optional hardware\u003c/li\u003e\n      \u003c/ul\u003e\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eOptional Hardware\u003c/b\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\n      \u003cul\u003e\n       \u003cli\u003e3D Mouse\u003c/li\u003e\n       \u003cli\u003eHP Reverb G2, Oculus Rift &amp; Rift S, HTC VIVE, VIVE Pro, VIVE Pro Eye, VIVE Pro 2, VIVE Cosmos &amp; VIVE Cosmos Elite, WinMR, HP Reverb, VRHero/XTAL, StarVR, Varjo VR-1, VR-2, XR-1, XR-3 HMD, and Logitech VR Ink Pilot Support\u003cbr\u003e \u003cbr\u003e \u003cb\u003eNOTE\u003c/b\u003e: WinMR and HP Reverb HMDs are supported via OpenVR\u003c/li\u003e\n      \u003c/ul\u003e\u003c/td\u003e\n    \u003c/tr\u003e\n   \u003c/tbody\u003e\n  \u003c/table\u003e \u003cbr\u003e\u003ci\u003eAutodesk is not responsible for errors or failures of Autodesk software arising from the instal
