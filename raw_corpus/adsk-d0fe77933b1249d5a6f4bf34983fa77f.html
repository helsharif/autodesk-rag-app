em Microsoft® Windows® 11 or Windows 10 version 1809 or above. See Autodesk's Product Support Lifecycle for support information. Processor Basic: 2.5–2.9 GHz processor (base) ARM Processors are not supported","title":"System requirements for AutoCAD LT 2024","publishDate":"2023-10-08 00:00:00","contentGroup":["Installation & Deployment","Learn & Explore"],"topicId":"kA93g0000001G1d","caasContent":"\u003cdiv id=\"sfdcarticles\" class=\"caas_sf\"\u003e\u003cdiv id=\"sfdcarticles\" class=\"caas_sf\"\u003e\n \u003cdiv id=\"issue\" class=\"adskkb_issues\"\u003e\n  \u003ch3\u003e\u003c/h3\u003e\u003cb\u003eReady to get started?\u003c/b\u003e\u003cbr\u003e\u003ca href=\"https://www.autodesk.com/products/autocad-lt/free-trial?utm_source=akn&amp;utm_medium=referral&amp;utm_campaign=system-requirement&amp;mktvar004=1047310&amp;internalc=true\" target=\"_blank\"\u003eDownload a free trial\u003c/a\u003e\u003cbr\u003e\u003ca href=\"https://www.autodesk.com/products/autocad-lt/subscribe?utm_source=akn&amp;utm_medium=referral&amp;utm_campaign=system-requirement&amp;mktvar004=1047309&amp;internalc=true\" target=\"_blank\"\u003eBuy now\u003c/a\u003e\n \u003c/div\u003e\n \u003cdiv id=\"solution\" class=\"adskkb_solution\"\u003e\n  \u003ch3\u003e\u003c/h3\u003e\n  \u003ctable border=\"1\" cellpadding=\"2\" cellspacing=\"0\"\u003e\n   \u003cthead\u003e\n    \u003ctr\u003e\n     \u003cth colspan=\"2\" rowspan=\"1\"\u003e\u003cb\u003eSystem requirements for AutoCAD LT 2024&nbsp;(Windows)\u003c/b\u003e\u003c/th\u003e\n    \u003c/tr\u003e\n   \u003c/thead\u003e\n   \u003ctbody\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eOperating System\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eMicrosoft® Windows® 11 or Windows 10 version 1809 or above. See Autodesk's \u003ca href=\"https://www.autodesk.com/support/account/manage/versions/support-lifecycle\" target=\"_blank\"\u003eProduct Support Lifecycle\u003c/a\u003e for support information.\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eProcessor\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eBasic\u003c/b\u003e: 2.5–2.9 GHz processor (base) ARM Processors are not supported.\u003cbr\u003e \u003cb\u003eRecommended\u003c/b\u003e: 3+ GHz processor (base), 4+ GHz (turbo)\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eMemory\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eBasic\u003c/b\u003e: 8 GB\u003cbr\u003e \u003cb\u003eRecommended\u003c/b\u003e: 16 GB\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eDisplay Resolution\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eConventional Displays:\u003c/b\u003e\u003cbr\u003e 1920 x 1080 with True Color\u003cbr\u003e \u003cb\u003eHigh Resolution &amp; 4K Displays:\u003c/b\u003e\u003cbr\u003e Resolutions up to 3840 x 2160 (with capable display card)\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eDisplay Card\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cp\u003e\u003cb\u003eBasic\u003c/b\u003e: 1 GB GPU with 29 GB/s Bandwidth and DirectX 11 compliant\u003cbr\u003e \u003cb\u003eRecommended\u003c/b\u003e: 4 GB GPU with 106 GB/s Bandwidth and DirectX 12 compliant\u003c/p\u003e \u003cp\u003eDirectX 12 with Feature Level 12_0 is required for&nbsp;Shaded(Fast) and Shaded with edges(Fast) visual styles.\u003c/p\u003e\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eDisk Space\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e10.0 GB (suggested SSD)\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003ePointing Device\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eMS-Mouse compliant\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003e.NET Framework\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e.NET Framework Version 4.8 or later\u003c/td\u003e\n    \u003c/tr\u003e\n   \u003c/tbody\u003e\n  \u003c/table\u003e &nbsp; \n  \u003ctable border=\"1\" cellpadding=\"2\" cellspacing=\"0\"\u003e\n   \u003cthead\u003e\n    \u003ctr\u003e\n     \u003cth colspan=\"2\" rowspan=\"1\"\u003e\u003cb\u003eSystem requirements for AutoCAD LT 2024&nbsp;for Mac\u003c/b\u003e\u003c/th\u003e\n    \u003c/tr\u003e\n   \u003c/thead\u003e\n   \u003ctbody\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eOperating System\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eApple® macOS® Ventura v13\u003cbr\u003e Apple macOS Monterey v12\u003cbr\u003e Apple macOS Big Sur v11\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eModel\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eApple Mac® computers compatible with macOS Big Sur or above\u003cbr\u003e \u003cstrong\u003eRecommended\u003c/strong\u003e: Apple Mac models supporting Metal Graphics Engine\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eCPU Type\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e64-bit Intel CPU\u003cbr\u003e Apple M series CPU\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eMemory\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eBasic\u003c/b\u003e: 4GB\u003cbr\u003e \u003cb\u003eRecommended\u003c/b\u003e: 8GB or higher\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eDisplay Resolution\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eBasic\u003c/b\u003e: 1280 x 800 display\u003cbr\u003e \u003cb\u003eHigh Resolution\u003c/b\u003e: 2880 x 1800 with Retina Display\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eDisk Space\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e6 GB free disk space for download and installation\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003ePointing Device\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eApple-compliant Mouse, Apple-compliant Trackpad, Microsoft-compliant mouse\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eDisplay Card\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eRecommended\u003c/b\u003e: Mac native installed graphics cards\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eDisk Format\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eAPFS, APFS(Encrypted), Mac OS Extended (Journaled), Mac OS Extended (Journaled, Encrypted)\u003c/td\u003e\n    \u003c/tr\u003e\n   \u003c/tbody\u003e\n  \u003c/table\u003e \u003cbr\u003e\u003cspan style=\"color: #999999;\"\u003e\u003cb\u003eNote:\u003c/b\u003e Not all Autodesk product offerings may be virtualized. You may virtualize a product only if the applicable terms and c
