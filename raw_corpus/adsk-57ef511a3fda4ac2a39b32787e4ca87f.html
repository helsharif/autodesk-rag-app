:{"request":{"origin":"upi","key":"caas/tsarticles/ts/4fFGc5IXADCGhtnuu89YjB.html","locale":"en-US"},"response":{"source":"tsarticles","url":"https://help.autodesk.com/ts/4fFGc5IXADCGhtnuu89YjB","shortDescription":"With Autodesk ReCap software you are able to create accurate 3D models with reality capture using laser scanning. This software, which lets you convert reality into a 3D model or 2D drawing, actually comes in two flavors: ReCap and ReCap Pro. This blog post is here to explain the differences between the two. To access ReCap, you can start a free 30-day trial. Once those 30 days are up, you will have the option to subscribe to ReCap Pro or continue using the free features of ReCap","title":"ReCap vs. ReCap Pro","publishDate":"2022-08-25 00:00:00","contentGroup":["Installation & Deployment","Troubleshooting"],"topicId":"4fFGc5IXADCGhtnuu89YjB","caasContent":"\u003cdiv id=\"tsarticles\" class=\"caas_ts\"\u003e\u003cp class=\"autodesk_styles_medium\"\u003eWith Autodesk ReCap software you are able to create accurate 3D models with reality capture using laser scanning. This software, which lets you convert reality into a 3D model or 2D drawing, actually comes in two flavors:&nbsp;\u003cstrong\u003eReCap&nbsp;\u003c/strong\u003eand\u003cstrong\u003e&nbsp;ReCap Pro\u003c/strong\u003e. This blog post is here to explain the differences between the two.\u003c/p\u003e\n\u003cp class=\"autodesk_styles_medium\"\u003eTo access ReCap, you can start a free 30-day trial. Once those 30 days are up, you will have the option to subscribe to ReCap Pro or continue using the free features of ReCap. Check out the comparison matrix below to review the different features!\u003c/p\u003e\n\u003cp class=\"autodesk_styles_medium\"\u003eTo learn more about each product, head to our&nbsp;\u003ca href=\"https://www.autodesk.com/products/recap/overview\" target=\"_blank\" rel=\"noopener\"\u003eReCap\u003c/a\u003e&nbsp;or&nbsp;\u003ca href=\"https://www.autodesk.com/products/recap/overview\" target=\"_blank\" rel=\"noopener\"\u003eReCap Pro\u003c/a\u003e product pages or \u003ca href=\"https://knowledge.autodesk.com/contact-support\"\u003eContact Support\u003c/a\u003e directly.\u003c/p\u003e\n\u003ctable style=\"width: 100%;\" border=\"1\"\u003e\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eProducts\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003eReCap\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003eReCap Pro\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eAt a glance\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003eBasic viewing and editing of reality capture data\u003c/td\u003e\n\u003ctd\u003eAutomated registration, stitching, and cleanup of scans\u003cbr /\u003e- Access to UAV features\u003cbr /\u003e- Team collaboration\n\u003cp class=\"autodesk_styles_medium\"\u003e&nbsp;\u003c/p\u003e\n\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eFeatures\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003e\u003cstrong\u003eLaser Scan Features\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eImport scans in various formats\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e&radic;\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e&radic;\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eRealViews\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e&radic;\u003c/strong\u003e\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e&radic;\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003eCreate elevation slices\u003c/td\u003e\n\u003ctd\u003e&nbsp;\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e&radic;\u003c/strong\u003e\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr\u003e\n\u003ctd\u003ePoint cloud viewing, basic editing with clip, and limitbox\u003c/td\u003e\n\u003ctd\u003e\u003cstrong\u003e&nb
