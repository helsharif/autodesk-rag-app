nical/article/caas/tsarticles/ts/10hF1W1B7DbOM0iqAexjN5.html"},{"locale":"fr-BE","url":"https://www.autodesk.fr/support/technical/article/caas/tsarticles/ts/10hF1W1B7DbOM0iqAexjN5.html"},{"locale":"fr-CA","url":"https://www.autodesk.fr/support/technical/article/caas/tsarticles/ts/10hF1W1B7DbOM0iqAexjN5.html"},{"locale":"fr-CH","url":"https://www.autodesk.fr/support/technical/article/caas/tsarticles/ts/10hF1W1B7DbOM0iqAexjN5.html"},{"locale":"hu-HU","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/10hF1W1B7DbOM0iqAexjN5.html"},{"locale":"it-CH","url":"https://www.autodesk.it/support/technical/article/caas/tsarticles/ts/10hF1W1B7DbOM0iqAexjN5.html"},{"locale":"nl-BE","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/10hF1W1B7DbOM0iqAexjN5.html"},{"locale":"nl-NL","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/10hF1W1B7DbOM0iqAexjN5.html"},{"locale":"no-NO","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/10hF1W1B7DbOM0iqAexjN5.html"},{"locale":"pl-PL","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/10hF1W1B7DbOM0iqAexjN5.html"},{"locale":"pt-PT","url":"https://www.autodesk.com.br/support/technical/article/caas/tsarticles/ts/10hF1W1B7DbOM0iqAexjN5.html"},{"locale":"sv-SE","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/10hF1W1B7DbOM0iqAexjN5.html"},{"locale":"tr-TR","url":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/10hF1W1B7DbOM0iqAexjN5.html"},{"locale":"zh-TW","url":"https://www.autodesk.com.cn/support/technical/article/caas/tsarticles/ts/10hF1W1B7DbOM0iqAexjN5.html"}]},"loadAA":true,"pageType":"caas"},"productData":{"productDocumentation":{},"bannerBoxData":{},"recommendationLoading":false,"recommendedContent":[],"customContentLoading":false,"error":{"errorType":null,"errorMetaData":null},"productSlug":"","browseTypes":[],"generalTopics":"","contactSupport":""},"caasData":{"request":{"origin":"upi","key":"caas/tsarticles/ts/10hF1W1B7DbOM0iqAexjN5.html","locale":"en-US"},"response":{"source":"tsarticles","url":"https://help.autodesk.com/ts/10hF1W1B7DbOM0iqAexjN5","shortDescription":"Today we’re announcing that we’ll cease supporting Autodesk Screencast on January 31, 2023. We’re inspired by the community that has rallied around Screencast and the shared discoveries Screencast has evoked. In 2012, we set out to create an environment where our customers could share what they know. As a part of our new Autodesk Knowledge Network, we envisioned a simple yet informative experience within the larger AKN platform for content sharing, help, and support","title":"Autodesk Screencast End-of-Life","publishDate":"2022-11-25 00:00:00","contentGroup":["Troubleshooting","Installation & Deployment"],"topicId":"10hF1W1B7DbOM0iqAexjN5","caasContent":"\u003cdiv id=\"tsarticles\" class=\"caas_ts\"\u003e\u003cp\u003eToday we’re announcing that we’ll cease supporting Autodesk Screencast on January 31, 2023. We’re inspired by the community that has rallied around Screencast and the shared discoveries Screencast has evoked.\u003c/p\u003e\n\n\u003cp\u003eIn 2012, we set out to create an environment where our customers could share what they know. As a part of our new Autodesk Knowledge Network, we envisioned a simple yet informative experience within the larger AKN platform for content sharing, help, and support.\u003c/p\u003e\n\n\u003cp\u003eWe want to make this transition as smooth as possible for everyone who uses Screencast. See the following FAQ to understand how the closure affects your Screencast data and learn the steps for transferring your videos to your desktop. All your video data will be available for download until January 31, 2023.&nbsp;\u003c/p\u003e\n\n\u003cp\u003eWhile it’s sad to say goodbye to Screencast, we’re eager to put our energy into expanding other new products and services for you.\u003c/p\u003e\n\n\u003cp\u003eWe’re proud of the product we’ve built, but even more so, we’re grateful for the community of contributors that found it useful and made it grow this past decade. Thank you!\u003c/p\u003e\n\n\u003cp\u003eAll the best from the Autodesk Screencast Team.\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\n\n\u003ch2\u003eFrequently Asked Questions\u003c/h2\u003e\n\n\u003cp\u003e\u003cstrong\u003eWhat does end-of-life (EOL) mean?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eA product’s life cycle begins when the software is first released and ends when the product is no longer supported by the developer or company that created it. Once the software reaches this point, it’s considered to be at EOL; that is, at the end of its life cycle.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eWhy is Autodesk Screencast being discontinued?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eScreencast never quite achieved its full&nbsp;potential, as it remained an add-on plugin and was never integrated into&nbsp;or&nbsp;shipped&nbsp;with&nbsp;our commercial&nbsp;products.&nbsp;A lot has changed in the last 10 years and&nbsp;there are now many&nbsp;free tools available for screensharing and recording video on both PC and Mac platforms.&nbsp;\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eWhy is Autodesk announcing the Screencast EOL&nbsp;now, ahead of the official EOL date?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eBy announcing the retirement of Autodesk Screencast now, we’re giving our customers plenty of time to download their Screencast videos and migrate their work to another video capture solution.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eHow long will my Autodesk Screencasts be available?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eWe want to make this transition as smooth as possible for everyone who uses Autodesk Screencast. All your video data will be available for download until January 31, 2023.&nbsp;After Jan 31, 2023, all Screencast content will be deleted from Autodesk servers, except those embedded in Autodesk community/forum posts or embedded within other customer websites.&nbsp;\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eIf I have an Autodesk Screencast embedded in a forum post, what will happen to it after January 31, 2023?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eAny embedded Screencast that exists within an Autodesk community/forum post will continue to be visible into the future to support the historical knowledge and solutions available when customers are searching for answers to their Autodesk software questions.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eWithout Screencast, how should I post my videos in the Autodesk forums?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eStarting in late August 2022, the forums will have a new capability for uploading videos directly into forum posts. You’ll still have to select the screen capture tool&nbsp;you want to use. Some possibilities are described at the end of this FAQ.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eIf I have an Autodesk Screencast embedded in my blog or website, what will happen to it after January 31, 2023?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eAny embedded Screencast that is hosted within a customer’s blog or website will continue to be visible into the future.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eDoes this change affect all existing Autodesk&nbsp;Screencasts&nbsp;in all geographies?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eYes, no matter which geography you’re in (Americas, EMEA, or Asia Pacific), all&nbsp;screencasts (except those embedded in the Autodesk forums or other customer websites) will be deleted as of January 31, 2023.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eDoes the Autodesk Screencast EOL impact any other Autodesk&nbsp;product?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eNo, the retirement of Autodesk Screencast doesn’t impact any other Autodesk product.&nbsp;\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eCan I keep using Autodesk Screencast until January 30,&nbsp;2023?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eYes, you can keep using Autodesk Screencast through January 30, 2023. Remember to download your videos as soon as you record them to be sure you retain them before all Screencasts are&nbsp;deleted on Jan 31, 2023 (except for embedded Screencasts).&nbsp;\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eWill Autodesk Screencast still function after January 31, 2023?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe Autodesk Screencast recorder app which you have installed on your desktop will no longer function after Jan 31, 2023. You will need to uninstall it.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eHow do I locate my Screencasts?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eYou can find your Screencasts on your personal Autodesk Dashboard. Follow these steps:\u003c/p\u003e\n\n\u003col class=\"adskBulletedList\"\u003e\n\t\u003cli\u003eStart Autodesk Screencast.\u003c/li\u003e\n\t\u003cli\u003eClick the three dots to open the context menu.\u003c/li\u003e\n\t\u003cli\u003eSelect Manage Screencasts to go to your Dashboard on \u003ca href=\"https://knowledge.autodesk.com/\"\u003eknowledge.autodesk.com\u003c/a\u003e. You may have to login using your Autodesk ID.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003e\u003cstrong\u003eHow do I transfer my existing Autodesk Screencast videos to my desktop?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eTo download your personal Screencasts, follow the steps in \u003ca href=\"https://knowledge.autodesk.com/article/How-to-download-your-Autodesk-Screencast-videos\"\u003eHow to download your Autodesk Screencasts\u003c/a\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eHow do I uninstall Autodesk Screencast?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eTo uninstall Autodesk Screencast, follow the instructions for your operating system in \u003ca href=\"https://knowledge.autodesk.com/article/How-to-uninstall-Autodesk-Screencast\"\u003eHow to uninstall Autodesk Screencast\u003c/a\u003e.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eWhat support is available for Autodesk Screencast up until the EOL date?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eAs Autodesk Screencast is a free product, the only Screencast support option is peer-to-peer, via the \u003ca href=\"https://forums.autodesk.com/t5/screencast/ct-p/57\"\u003eScreencast community forum\u003c/a\u003e group provided&nbsp;for&nbsp;our customers.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eCan I still download the Autodesk Screencast recording app&nbsp;until January 30, 2023?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eNo, we’ll be removing download access to the&nbsp;Screencast recorder&nbsp;app on December 1, 2022.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eDoes Autodesk offer any replacement screen recording software?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eAutodesk doesn’t have other screen recording products available to replace Autodesk Screencast. However, you can find a variety of free and purchasable screen recording products for Windows and macOS.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eAre there any other products or services that can replace the functionality of Autodesk Screencast for screen recording?\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eTo help you find the screen recorder which fits your needs, here’s an overview of some generally available products.&nbsp;You’ll also find free and purchasable products in the \u003ca href=\"https://apps.microsoft.com/store/apps\"\u003eMicrosoft App Store\u003c/a\u003e, \u003ca href=\"https://www.apple.com/app-store/\"\u003eMac App Store\u003c/a\u003e, and \u003ca href=\"https://chrome.google.com/webstore/category/extensions\"\u003eChrome Web Store\u003c/a\u003e.&nbsp;Autodesk can’t make specific recommendations and does not endorse any of the products listed below. You’ll have to decide on the tool that best meets your unique use case(s).\u003c/p\u003e\n\n\u003ch4 style=\"margin-left: 40px\"\u003eSlack and Zoom\u003c/h4\u003e\n\n\u003cp style=\"margin-left: 40px\"\u003eIf&nbsp;you’re a casual or part-time screen recording practitioner, consider \u003ca href=\"https://slack.com/\"\u003eSlack\u003c/a\u003e&nbsp;and&nbsp;\u003ca href=\"https://zoom.us/\"\u003eZoom\u003c/a\u003e. Both have apps&nbsp;for both Windows and macOS&nbsp;that offer easy methods of recording your desktop and creating videos. Both also offer mobile apps for iOS and Android. You can share your Zoom or Slack videos on most forums and blogs.\u003c/p\u003e\n\n\u003cp style=\"margin-left: 40px\"\u003eTo learn more about creating videos with Slack or Zoom, see \u003ca href=\"https://knowledge.autodesk.com/article/How-to-create-videos-with-Slack-or-Zoom\"\u003ethis short tutorial\u003c/a\u003e.\u003c/p\u003e\n\n\u003ch4 style=\"margin-left: 40px\"\u003eCamtasia\u003c/h4\u003e\n\n\u003cp style=\"margin-left: 40px\"\u003eThe \u003ca href=\"https://www.techsmith.com/video-editor.html\"\u003eTechSmith Camtasia\u003c/a\u003e desktop app, available for both Windows and macOS, provides a suite of robust editing tools for video creation.\u003c/p\u003e\n\n\u003ch4 style=\"margin-left: 40px\"\u003eCloudApp\u003c/h4\u003e\n\n\u003cp style=\"margin-left: 40px\"\u003e\u003ca href=\"https://www.getcloudapp.com\"\u003eCloudApp\u003c/a\u003e&nbsp;provides recording software and a hosting site which allows you to record your screen as a video. Your video can feature your voice and face, or an annotated image, or a GIF loop. You can share videos instantly with internal employees as well as external customers.&nbsp;CloudApp’s screen recording tool is available for Windows, macOS, iOS, and Chrome.\u003c/p\u003e\n\n\u003cp style=\"margin-left: 20px\"\u003e&nbsp;\u003c/p\u003e\n\n\u003ch2 id=\"Contributed-articles-and-collections\"\u003eDiscontinuation of contributed articles and content collections\u003c/h2\u003e\n\n\u003cp\u003e\u003cb\u003eWhy are Autodesk contributed articles being discontinued?\u003c/b\u003e\u003c/p\u003e\n\n\u003cp\u003eThe user-authored article program was launched as an experiment to allow the Autodesk Community to share their knowledge with others. Though these tools were originally available on the Support site, they are now being integrated into the Community to provide the most value and reach the broadest audience.&nbsp;\u003c/p\u003e\n\n\u003cp\u003e\u003cb\u003eHow long will my contributed articles be available?\u003c/b\u003e\u003c/p\u003e\n\n\u003cp\u003eWe want to give users every opportunity to archive the content they’ve authored or that they find useful. At some point after March 8, 2023, we will remove any user-authored articles or content collections from Autodesk websites.\u003c/p\u003e\n\n\u003cp\u003e\u003cb\u003eHow do I archive articles or content collections that I’ve authored or that I find useful?\u003c/b\u003e&nbsp;\u003c/p\u003e\n\n\u003cp\u003eYou can simply copy/paste the content of the article or collection into your own archive.&nbsp;If you are the author of articles or collections, you can find them on the \u003ca href=\"https://knowledge.autodesk.com/profile/contributions#/dashboard/public\"\u003eContribution Dashboard\u003c/a\u003e, go into edit mode, and copy/paste them from there.&nbsp;\u003c/p\u003e\n\n\u003cp\u003e\u003cb\u003eWhere can I contribute content going forward?\u003c/b\u003e\u003c/p\u003e\n\n\u003cp\u003eAutodesk Community is the primary destination for user-contributed content. You can learn more about how you can get involved on the \u003ca href=\"https://www.autodesk.com/community/get-involved\"\u003eAutodesk Community website\u003c/a\u003e.&nbsp;The Community Voices blog and Community Tips are ideal venues for sharing knowledge with other users.\u003c/p\u003e\n\n\u003cp\u003e&nbsp;\u003c/p\u003e\u003c/div\u003e","publisher":"Autodesk","language":"english","lastUpdateDate":"2023-01-26 00:00:00","contentUrl":"https://www.autodesk.com/support/technical/article/caas/tsarticles/ts/10hF1W1B7DbOM0iqAexjN5.html","caasKey":"caas/tsarticles/ts/10hF1W1B7DbOM0iqAexjN5.html","upiLanguage":"ENU","nodeId":"10hF1W1B7DbOM0iqAexjN5","knowledgeSource":"Technical Support","mediaType":["Text Only"],"audience":["User"],"docnUrl":"autodesk-screencast-end-life","contactSupport":"\n\n\n\u003cdiv class=\"xfpage-content-container\"\u003e\n  \n  \u003cdiv class=\"root container responsivegrid\"\u003e\n\n    \n    \n    \n    \u003cdiv id=\"container-3acc490818\" class=\"cmp-container\"\u003e\n        \n        \u003cdiv class=\"flexible-text\"\u003e\u003cdiv id=\"flexible-text-106aeb187a\" class=\"pnl-ft dhig-theme--light dhig-py-8\" data-wat-content-type=\"panel\" data-wat-content-name=\"flexible text-only\" style=\"background-color: #f9f9f9;\"\u003e\n  \u003cdiv class=\"page-container-wrapper\"\u003e\n    \u003cdiv class=\"page-container\"\u003e\n      \n      \u003cdiv class=\"pnl-ft__heading lg:dhig-w-3/5\"\u003e\n\u003cdiv id=\"title-d8bb64ba85\" class=\"cmp-title\"\u003e\n  \u003ch2 class=\"cmp-title__text dhig-typography-headline-medium\"\u003e\n    Need help? Ask the Autodesk Assistant!\u003c/h2\u003e\n\u003c/div\u003e\n\n    \n\n\u003c/div\u003e\n      \u003cdiv class=\"md:dhig-flex\"\u003e\n        \u003cdiv class=\"lg:dhig-w-3/5 md:dhig-w-2/3\"\u003e\n          \n          \u003cdiv class=\"dhig-mt-2 pnl-ft__subheading\"\u003e\n\u003cdiv id=\"text-f19f35bbbd\" class=\"cmp-text dhig-typography-body-copy-medium\"\u003e\n  \u003cdiv class=\"cmp-text-editable\"\u003e\n    \u003cp\u003eThe Assistant can help you find answers or contact an agent.\u003c/p\u003e\n\n  \u003c/div\u003e\n\u003c/div\u003e\n\n\n    \n\n\u003c/div\u003e\n          \n          \u003cdiv class=\"dhig-mt-4 pnl-ft__cta-button\"\u003e\n\u003cdiv class=\"cmp-button__wrapper \"\u003e\n  \n    \u003ca class=\"cmp-button MuiButtonBase-root MuiButton-root MuiButton-contained assistant-onclick \" id=\"
