nical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Smoke-Questions-and-Answers.html"},{"locale":"hu-HU","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Smoke-Questions-and-Answers.html"},{"locale":"it-CH","url":"https://www.autodesk.it/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Smoke-Questions-and-Answers.html"},{"locale":"nl-BE","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Smoke-Questions-and-Answers.html"},{"locale":"nl-NL","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Smoke-Questions-and-Answers.html"},{"locale":"no-NO","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Smoke-Questions-and-Answers.html"},{"locale":"pl-PL","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Smoke-Questions-and-Answers.html"},{"locale":"pt-PT","url":"https://www.autodesk.com.br/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Smoke-Questions-and-Answers.html"},{"locale":"sv-SE","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Smoke-Questions-and-Answers.html"},{"locale":"tr-TR","url":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Smoke-Questions-and-Answers.html"},{"locale":"zh-TW","url":"https://www.autodesk.com.cn/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Smoke-Questions-and-Answers.html"}]},"loadAA":true,"pageType":"caas"},"productData":{"productDocumentation":{},"bannerBoxData":{},"recommendationLoading":false,"recommendedContent":[],"customContentLoading":false,"error":{"errorType":null,"errorMetaData":null},"productSlug":"","browseTypes":[],"generalTopics":"","contactSupport":""},"caasData":{"request":{"origin":"upi","key":"caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Smoke-Questions-and-Answers.html","locale":"en-US"},"response":{"source":"sfdcarticles","url":"http://help.autodesk.com.s3.amazonaws.com/sfdcarticles/Changes-to-Autodesk-Smoke-Questions-and-Answers","shortDescription":"Overview On September 7, 2022, Autodesk will discontinue the sale of new and renewal of Autodesk Smoke software subscriptions. If you wish to continue using a 3D compositing, VFX, and finishing toolset, you will have the option to purchase an Autodesk Flame Assist software subscription at a discounted price. Questions and Answers 1. What is happening to Smoke? As of September 7, 2022, Autodesk will discontinue the sale of new and renewal of Smoke subscription(s)","title":"Changes to Autodesk Smoke: Questions and Answers","publishDate":"2023-10-08 00:00:00","contentGroup":["Troubleshooting"],"topicId":"kA93g000000CgQo","caasContent":"\u003cdiv id=\"sfdcarticles\" class=\"caas_sf\"\u003e\u003cdiv id=\"sfdcarticles\" class=\"caas_sf\"\u003e\n \u003cdiv id=\"issue\" class=\"adskkb_issues\"\u003e\n  \u003ch3\u003e\u003c/h3\u003e\n  \u003ch2\u003eOverview\u003c/h2\u003e On September 7, 2022, Autodesk will discontinue the sale of new and renewal of Autodesk Smoke software subscriptions. If you wish to continue using a 3D compositing, VFX, and finishing toolset, you will have the option to purchase an Autodesk Flame Assist software subscription at a discounted price.\u003cbr\u003e&nbsp;\n \u003c/div\u003e\n \u003cdiv id=\"solution\" class=\"adskkb_solution\"\u003e\n  \u003ch3\u003e\u003c/h3\u003e\n  \u003ch2\u003eQuestions and Answers\u003c/h2\u003e \u003cb\u003e1. What is happening to Smoke?\u003c/b\u003e\u003cbr\u003e\u003cbr\u003eAs of September 7, 2022, Autodesk will discontinue the sale of new and renewal of Smoke subscription(s). You will no longer be able to purchase new subscriptions or renew your existing Smoke subscription(s).\u003cbr\u003e\u003cbr\u003e\u003cb\u003e2. Why is Autodesk discontinuing the sale of Smoke?\u003c/b\u003e\u003cbr\u003e\u003cbr\u003eAutodesk believes we can better serve your content creation needs by investing in building enhanced 3D compositing, VFX, and finishing toolsets in the Flame Family of products.\u003cbr\u003e\u003cbr\u003e\u003cb\u003e3. How will these changes affect you?\u003c/b\u003e\u003cbr\u003e\u003cbr\u003eYou can continue to purchase new and renew Smoke subscriptions until September 6, 2022.\u003cbr\u003e\u003cbr\u003eStarting September 7, 2022, you will no longer be able to purchase new subscriptions or renew your existing subscription(s) of Smoke.&nbsp;\u003cbr\u003e\u003cbr\u003eAs of June 7, 2022, and at the time of your Smoke subscription renewal, you will have the option to purchase a Flame Assist subscription at a similar cost to your Smoke subscription. You can choose to purchase an annual or 3-year subscription of Flame Assist.\u003cbr\u003e\u003cbr\u003e\u003cb\u003e4. Will my Smoke subscription(s) purchased online continue to auto-renew (if not turned off) after September 7, 2022?\u003c/b\u003e\u003cbr\u003e\u003cbr\u003eNo, your Smoke subscription(s) will not continue to auto-renew past September 7, 2022. You will lose access to your Smoke subscription at the end of your current contract term.\u003cbr\u003e\u003cbr\u003e\u003cb\u003e5. Will support be available to me?\u003c/b\u003e\u003cbr\u003e\u003cbr\u003eYou will continue to receive technical support until the end of your current Smoke subscription contract. However, there will be no software releases, updates, or fixes to Smoke.\u003cbr\u003e\u003cbr\u003e\u003cb\u003e6. What options are available to me if I still need access to Smoke after September 7, 2022?\u003c/b\u003e\u003cbr\u003e\u003cbr\u003eIf you need access to similar functionalities of Smoke and have an active Smoke subscription after September 7, 2022, you will have the option at the time of renewal to purchase an annual or 3-year Flame Assist subscription at a similar price to Smoke. You will have access to the following additional capabilities with the purchase of Flame Assist for Linux or macOS: \n  \u003cul\u003e\n   \u003cli\u003eConnected Conform Workflow\u003c/li\u003e\n   \u003cli\u003eEffect Tab color grading environment\u003c/li\u003e\n   \u003cli\u003eUpdated media formats supported (BMD Raw, RED ® IPP2, ARRIRAW, Apple ProRes TM, MXF)\u003c/li\u003e\n   \u003cli\u003eDolby Vision™ metadata authoring and display\u003c/li\u003e\n   \u003cli\u003eA timeline centric, fully compatible assistant station for Autodesk Flame\u003c/li\u003e\n  \u003c/ul\u003e If your Smoke subscription expires prior to migrating to Flame Assist at the discounted &nbsp;price, you will need to subscribe to Flame or Flame Assist at the full price to have access to similar functionalities of Smoke. Please contact an \u003ca href=\"https://www.autodesk.com/benefits/overview\" target=\"_blank\"\u003eAutodesk sales representative\u003c/a\u003e or an \u003ca href=\"https://www.autodesk.ca/en/partners/locate-a-reseller\" target=\"_blank\"\u003eAutodesk-authorized reseller\u003c/a\u003e for pricing details.\u003cbr\u003e\u003cbr\u003e\u003cb\u003e7. How can I purchase a Flame Assist subscription at a similar price to my Smoke subscription?\u003c/b\u003e\u003cbr\u003e\u003cbr\u003eIf you &nbsp;wish to purchase a Flame Assist subscription, you must contact your Autodesk-authorized reseller as Flame Assist is not available for sale via Autodesk.com.&nbsp;\u003cbr\u003e\u003cbr\u003eIf you purchased your Smoke subscription online, you would need to work with an \u003ca href=\"https://www.autodesk.com/benefits/overview\" target=\"_blank\"\u003eAutodesk sales representative\u003c/a\u003e&nbsp;or an \u003ca href=\"https://www.autodesk.ca/en/partners/locate-a-reseller\" target=\"_blank\"\u003eAutodesk-authorized reseller\u003c/a\u003e&nbsp;to purchase a Flame Assist subscription at a similar price. &nbsp;&nbsp;\u003cbr\u003e\u003cbr\u003e\u003cb\u003e8. When am I eligible to purchase a Flame Assist subscription at a similar price to my Smoke subscription?\u003c/b\u003e\u003cbr\u003e\u003cbr\u003eYou may only purchase a Flame Assist subscription at a similar price to your Smoke subscription at the time of renewal with an \u003ca href=\"https://www.autodesk.com/benefits/overview\" target=\"_blank\"\u003eAutodesk sales representative\u003c/a\u003e or an \u003ca href=\"https://www.autodesk.ca/en/partners/locate-a-reseller\" target=\"_blank\"\u003eAutodesk-authorized reseller\u003c/a\u003e.\u003cbr\u003e\u003cbr\u003e\u003cb\u003e9. Can I purchase additional Flame Assist subscriptions at the discounted price?\u003c/b\u003e\u003cbr\u003e\u003cbr\u003eNo, if you require additional Flame Assist subscriptions that extend beyond your Smoke subscription(s), you will need to purchase them at the full Flame Assist subscription price. The discounted offering is only limited to the number of Smoke subscriptions you have.\u003cbr\u003e\u003cbr\u003e\u003cb\u003e10. How do I know if I am eligible for the discounted Flame Assist subscription?\u003c/b\u003e\u003cbr\u003e\u003cbr\u003eTo be eligible to purchase Flame Assist at a discounted price, you must have an active Smoke subscription and only at the time of renewal can you purchase Flame Assist. &nbsp;&nbsp;\u003cbr\u003e\u003cbr\u003e\u003cb\u003e11. What is Flame Assist?\u003c/b\u003e\u003cbr\u003e\u003cbr\u003eFlame Assist is a compatible, timeline-centric assistant workstation for Flame, a 3D compositing, VFX, and editorial finishing software, used by VFX supervisors, CG compositing artists, 3D world builders, colorists, and finishers for film and TV productions. &nbsp;\u003cbr\u003e\u003cbr\u003e\u003cb\u003e12. How does Flame Assist compare to Smoke?\u003c/b\u003e\u003cbr\u003e\u003cbr\u003eFlame Assist provides the highest feature parity to Smoke. Furthermore, Smoke currently has a subset of Flame Assist features, meaning you gain additional capabilities by migrating to a Flame Assist subscription at a similar price to Smoke.&nbsp;\u003cbr\u003e\u003cbr\u003e\u003cb\u003e13. Are there any requirements for me to transfer my Smoke data when migrating to Flame Assist?\u003c/b\u003e\u003cbr\u003e\u003cbr\u003eTo access projects created in Smoke, you must archive the project within Smoke and restore the archive in Flame Assist. All projects must be archived prior to your Smoke subscription expiring or data will not be transferable.\u003cbr\u003e\u003cbr\u003e\u003cb\u003e14. How will these changes affect educational access to Smoke?\u003c/b\u003e\u003cbr\u003e\u003cbr\u003eAs of September 7, 2022, educational access to Smoke will no longer be available for students and educators. Students and educators with existing entitlements to Smoke will not be able to renew access when their current subscription term ends. Functionality similar to that available in Smoke is available to education customers who request an entitlement to Autodesk Flame.\u003cbr\u003e\u003cbr\u003e\u003cb\u003e15. Who should I contact for more information?\u003c/b\u003e\u003cbr\u003e\u003cbr\u003ePlease contact an with \u003ca href=\"https://www.autodesk.com/benefits/overview\" target=\"_blank\"\u003eAutodesk sales representative\u003c/a\u003e or an \u003ca href=\"https://www.autodesk.ca/en/partners/locate-a-reseller\" target=\"_blank\"\u003eAutodesk-authorized reseller\u003c/a\u003e&nbsp;for more information.\u003cbr\u003e&nbsp;\n \u003c/div\u003e\n \u003cdiv id=\"products\" class=\"adskkb_products\"\u003e\n  \u003ch3\u003eProducts:\u003c/h3\u003e Smoke;\n \u003c/div\u003e\n\u003c/div\u003e\u003c/div\u003e","publisher":"Autodesk","language":"english","releaseYear":"2024","lastUpdateDate":"2023-10-08 00:00:00","contentUrl":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/Changes-to-Autodesk-Smoke-Questions-and-Answers.html","subSource":"FaqArticle","caasKey":"caas/sfdcarticles/sfdcarticles/Chang
