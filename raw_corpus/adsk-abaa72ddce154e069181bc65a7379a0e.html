elp.autodesk.com.s3.amazonaws.com/sfdcarticles/System-requirements-for-Autodesk-InfraWorks","shortDescription":"Ready to get started? Download a free trial Buy now Java Requirements for Autodesk InfraWorks The supported Java Runtime Environment (JRE) for Autodesk InfraWorks has changed. Beginning February 2019, users of Autodesk InfraWorks will need to install and maintain a supported Java Runtime Environment on their own. Windows Operating System Requirements for Autodesk InfraWorks To be eligible for support, Autodesk software must be running on vendor-supported operating systems","title":"System requirements for Autodesk InfraWorks","publishDate":"2023-01-17 00:00:00","contentGroup":["Learn & Explore","Installation & Deployment"],"topicId":"kA93g0000000J90","caasContent":"\u003cdiv id=\"sfdcarticles\" class=\"caas_sf\"\u003e\u003cdiv id=\"sfdcarticles\" class=\"caas_sf\"\u003e\n \u003cdiv id=\"issue\" class=\"adskkb_issues\"\u003e\n  \u003ch3\u003e\u003c/h3\u003e\u003cb\u003eReady to get started?\u003c/b\u003e\u003cbr\u003e\u003ca href=\"https://www.autodesk.com/products/infraworks/free-trial?utm_source=akn&amp;utm_medium=referral&amp;utm_campaign=system-requirement&amp;mktvar004=1047310&amp;internalc=true\" target=\"_blank\"\u003eDownload a free trial\u003c/a\u003e\u003cbr\u003e\u003ca href=\"https://www.autodesk.com/products/infraworks/subscribe?utm_source=akn&amp;utm_medium=referral&amp;utm_campaign=system-requirement&amp;mktvar004=1047309&amp;internalc=true\" target=\"_blank\"\u003eBuy now\u003c/a\u003e\n \u003c/div\u003e\n \u003cdiv id=\"solution\" class=\"adskkb_solution\"\u003e\n  \u003ch3\u003e\u003c/h3\u003e\n  \u003cp\u003e\u003cb\u003eJava Requirements for Autodesk InfraWorks\u003c/b\u003e\u003cbr\u003eThe supported Java Runtime Environment (JRE) for Autodesk InfraWorks has changed. Beginning February 2019, users of Autodesk InfraWorks will need to install and maintain a supported Java Runtime Environment on their own.\u003c/p\u003e\n  \u003cp\u003e\u003cb\u003eWindows Operating System Requirements for Autodesk InfraWorks\u003c/b\u003e\u003cbr\u003eTo be eligible for support, Autodesk software must be running on vendor-supported operating systems. If a vendor chooses to end support for an operating system, our support for Autodesk products running on that operating system will also end, whether or not the products are among the eligible previous versions. \u003ca href=\"https://knowledge.autodesk.com/customer-service/account-management/users-software/previous-versions/previous-version-support-policy\" target=\"_blank\"\u003eRead the Autodesk Product Lifecycle Policy\u003c/a\u003e for more information.\u003c/p\u003e\n  \u003ctable border=\"1\" cellpadding=\"2\" cellspacing=\"0\"\u003e\n   \u003cthead\u003e\n    \u003ctr\u003e\n     \u003cth colspan=\"2\" rowspan=\"1\" style=\"text-align: left;background-color: #eeeeee;\"\u003e\u003cb\u003eSystem requirements for Autodesk InfraWorks\u003c/b\u003e\u003c/th\u003e\n    \u003c/tr\u003e\n   \u003c/thead\u003e\n   \u003ctbody\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eOperating System\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003eMicrosoft® Windows® 10 64-bit Enterprise or Pro, Microsoft® Windows® 11 64-bit\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eCPU Type\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003eDual-core Intel® Core™2 or equivalent AMD processor (Quad-core Intel® Core™ i7, 6-core Intel® Xeon®, or better processor highly recommended); to use the ray traced rendering functionality, CPU must support SSE 4.1\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003eMemory\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e8 GB RAM minimum (16+ GB recommended)\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003eDisplay Resolution\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e1,280 x 720 or greater (1,440 x 900+ recommended)\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003eDisplay Card\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003eAny DirectX® 10.1 capable graphics card with 2 GB (or more) graphics memory, supporting 8x Antialiasing (8x AA), such as NVIDIA Quadro® 5000 or 6000 for desktops and NVIDIA Quadro 2000M or GeForce® GT 650M for laptops; (Any DirectX 10.1 capable graphics card with 1 GB graphics memory supporting 2x antialiasing (2x AA) minimum)\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003eDisk Space\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e16 GB\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003ePointing Device\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003eMicrosoft-compliant mouse\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003eMedia\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003eDVD or download file\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003eBrowser\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003eGoogle Chrome™ (latest), or Firefox® (latest)\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cstrong\u003eInternet\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003eInternet connection for full online help and learning materials accessibility and Autodesk® Cloud services\u003c/td\u003e\n    \u003c/tr\u003e\n   \u003c/tbody\u003e\n  \u003c/table\u003e &nbsp; \n  \u003cp\u003e\u003cem\u003eAutodesk is not responsible for errors or failures of Autodesk software arising from the installation of updates, extensions or new releases issued by third party hardware or software vendors for the qualified software or hardware identified in this document (or for any other third party software or hardware that you may use in connection with Autodesk products).\u003c/em\u003e\u003c/p\u003e\n \u003c/div\u003e\n \u003cdiv id=\"products\" class=\"adskkb_products\"\u003e\n  \u003ch3\u003eProducts:\u003c/h3\u003e InfraWorks;\n \u003c/div\u003e\n\u003c/div\u003e\u003c/div\u003e","publisher":"Autodesk","language":"english","releaseYear":"2024","lastUpdateDate":"2023-11-21 00:00:00","contentUrl":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/System-requirements-for-Autodesk-InfraWorks.html","subSource":"FaqArticle","caasKey":"caas/sfdcarticles/sfdcarticles/System-requirements-for-Autodesk-InfraWorks.html","sfdcId":"kA93g0000000J90","upiLanguage":"ENU","productLine":["Industry Collections","Architecture Engineering & Construction Collection","InfraWorks"],"caseCount":"24","nodeId":"kA93g0000000J90","caseId":["16113120","13279551","18804272","13254267","16293232","14410875","15112472","17033661","14686191","20334855","14485997","16307932","12644946","
