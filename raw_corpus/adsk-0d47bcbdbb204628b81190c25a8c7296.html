® Windows® 10 or Windows 11. See Autodesk's \u003ca href=\"https://knowledge.autodesk.com/customer-service/account-management/users-software/previous-versions/previous-version-support-policy\" target=\"_blank\"\u003eProduct Support Lifecycle\u003c/a\u003e for support information.\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eCPU Type\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eIntel® i-Series, Xeon®, AMD® Ryzen, Ryzen Threadripper PRO. 2.5GHz or Higher.\u003cbr\u003e \u003cbr\u003e Highest CPU GHz recommended.\u003cbr\u003e Autodesk® Revit® software products will use multiple cores for many tasks.\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eMemory\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e8 GB RAM \n      \u003cul\u003e\n       \u003cli\u003eUsually sufficient for a typical editing session for a single model up to approximately 100 MB on disk. This estimate is based on internal testing and customer reports. Individual models will vary in their use of computer resources and performance characteristics.\u003c/li\u003e\n       \u003cli\u003eModels created in previous versions of Revit software products may require more available memory for the one-time upgrade process.\u003c/li\u003e\n      \u003c/ul\u003e\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eVideo Display Resolutions\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eMinimum:\u003c/strong\u003e\u003cbr\u003e 1280 x 1024 with true color\u003cbr\u003e \u003cbr\u003e \u003cstrong\u003eMaximum:\u003c/strong\u003e\u003cbr\u003e UltraHigh (4k) Definition Monitor\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eVirtualization Software\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eParallels Desktop for Mac\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eVirtual Machine Operating System¹\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eMicrosoft Windows 10 64-bit\u003cbr\u003e Microsoft Windows 11\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eVirtual Machine Browser\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eChrome, Edge, or Firefox\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003e.NET Framework\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e.NET Framework Version 4.8 or later.\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eVirtual Machine Memory\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e8 GB RAM \n      \u003cul\u003e\n       \u003cli\u003eUsually sufficient for a typical editing session for a single model up to approximately 100 MB on disk. This estimate is based on internal testing and customer reports. Individual models will vary in their use of computer resources and performance characteristics.\u003c/li\u003e\n       \u003cli\u003eModels created in previous versions of Revit software products may require more available memory for the one-time upgrade process.\u003c/li\u003e\n      \u003c/ul\u003e\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eVirtual Machine Video Adapter\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e4 GB video memory minimum dedicated to the Microsoft Windows Virtual Machine. Starting with Parallels Desktop for Mac version 14, use Automatic graphics memory for maximum efficiency.\u003cbr\u003e \u003cbr\u003e \u003cstrong\u003eNote:\u003c/strong\u003e While at Retina® display resolutions on macOS, turn off any Retina Resolution options in Parallels Desktop to adjust for proper DPI within Windows and Revit software products.\u003cbr\u003e \u003cbr\u003e \u003cstrong\u003eGraphics:\u003c/strong\u003e\u003cbr\u003e Parallels Desktop virtual display adapter without “Use Hardware Acceleration” option in Revit software products.\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eDisk Space\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eMinimum 40 GB free disk space; recommend 100 GB free disk space available\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003ePointing Device\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eMS-Mouse or 3Dconnexion compliant device\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eConnectivity\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eInternet connection for license registration and prerequisite component download\u003c/td\u003e\n    \u003c/tr\u003e\n   \u003c/tbody\u003e\n  \u003c/table\u003e\n  \u003cp\u003e\u003ca href=\"#returntop\"\u003eReturn to Top\u003c/a\u003e\u003c/p\u003e\n  \u003cp\u003e¹ \u003ca href=\"http://www.autodesk.com/revit-mac-2015-enu\" target=\"_blank\"\u003eLearn more\u003c/a\u003e about using Autodesk Revit or Autodesk Revit LT software with Boot Camp, part of macOS that enables you to install and run Microsoft Windows (and Windows-based applications) on a Mac® computer or with Parallels Desktop, a system utility available from Parallels, Inc. that allows you to run applications in each operating system without restarting your computer.\u003c/p\u003e\n  \u003cp\u003e² Disclaimer: The Citrix application is network-based and performance of Autodesk Revit for Citrix software products may vary with network performance. The software does not include the Citrix application, nor does Autodesk provide direct support for issues with the Citrix application. Users should contact Citrix directly with questions related to procurement and operation of the Citrix application.\u003c/p\u003e\n  \u003cp\u003e³ Disclaimer: The VMware application is network-based and performance of Autodesk Revit for VMware software products may vary with network performance. The software does not include the VMware application, nor does Autodesk provide direct support for issues with the VMware application. Users should contact VMware directly with questions related to procurement and operation of the VMware application.\u003c/p\u003e\n  \u003cp\u003e\u003csup\u003e4\u003c/sup\u003e Please see: \u003ca href=\"https://www.nvidia.com/en-us/data-center/virtualization/resources/\" target=\"_blank\"\u003ehttps://www.nvidia.com/en-us/data-center/virtualization/resources/\u003c/a\u003e\u003c/p\u003e \u003ci\u003eAutodesk, the Autodesk logo, Revit, and Revit LT are registered trademarks or trademarks of Autodesk, Inc., and/or its subsidiaries and/or affiliates, in the USA and/or other countries. Boot Camp, Mac, MacBook Pro, OS X, and Retina are trademarks of Apple, Inc., registered in the U.S. and other countries. Microsoft, DirectX, Internet Explorer, and Windows are all either registered trademarks or trademarks of Microsoft Corporation in the United States and/or other countries. Citrix and XenApp are registered trademarks of Citrix Systems, Inc. VMware, VMware Horizon, VMware VSphere and vSphere are registered trademarks or trademarks of VMware, Inc. All other
