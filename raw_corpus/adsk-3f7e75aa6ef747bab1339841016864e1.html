r is required. EAGLE 64-bit requires a 64-bit operating system. Linux Linux® based on kernel 2.6 for Intel computers, X11 with a minimum color depth of 8 bpp, the following runtime libraries: libssl.so.1.0.0, libcrypto.so.1.0.0, and CUPS for printing. For the 64-bit version EAGLE requires a 64 bit-operating system and libc","title":"System requirements for Autodesk EAGLE","publishDate":"2023-10-08 00:00:00","contentGroup":["Installation & Deployment","Learn & Explore"],"topicId":"kA93g00000001qm","caasContent":"\u003cdiv id=\"sfdcarticles\" class=\"caas_sf\"\u003e\u003cdiv id=\"sfdcarticles\" class=\"caas_sf\"\u003e\n \u003cdiv id=\"issue\" class=\"adskkb_issues\"\u003e\n  \u003ch3\u003eIssue:\u003c/h3\u003eThis article provides the system requirements for Autodesk® EAGLE.\n \u003c/div\u003e\n \u003cdiv id=\"solution\" class=\"adskkb_solution\"\u003e\n  \u003ch3\u003eSolution:\u003c/h3\u003e\n  \u003ctable border=\"1\" cellpadding=\"2\" cellspacing=\"0\"\u003e\n   \u003cthead style=\"text-align: left;background-color: #eeeeee;\"\u003e\n    \u003ctr\u003e\n     \u003cth colspan=\"2\" rowspan=\"1\"\u003e\u003cb\u003eSystem Requirements for Autodesk EAGLE\u003c/b\u003e\u003c/th\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003cth colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cb\u003eOperating System\u003c/b\u003e\u003c/th\u003e\n     \u003cth colspan=\"1\" rowspan=\"1\" style=\"text-align: left;\"\u003e\u003cb\u003eRequirements\u003c/b\u003e\u003c/th\u003e\n    \u003c/tr\u003e\n   \u003c/thead\u003e\n   \u003ctbody\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eWindows\u003c/b\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eMicrosoft® Windows® 7 or newer is required.\u003cbr\u003e \u003cbr\u003e EAGLE 64-bit requires a 64-bit operating system.\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eLinux\u003c/b\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eLinux® based on kernel 2.6 for Intel computers, X11 with a minimum color depth of 8 bpp, the following runtime libraries: libssl.so.1.0.0, libcrypto.so.1.0.0, and CUPS for printing.\u003cbr\u003e \u003cbr\u003e For the 64-bit version EAGLE requires a 64 bit-operating system and libc.so.6 with sub version GLIBC_2.14 or higher.\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eMac\u003c/b\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eApple® Mac OS® X version 10.10 or above for Intel computers.\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eAll Operating Systems\u003c/b\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eA minimum graphics resolution of 1024x768 pixels and preferably a 3-button wheel mouse.\u003c/td\u003e\n    \u003c/tr\u003e\n   \u003c/tbody\u003e\n  \u003c/table\u003e &nbsp; \n  \u003cp\u003e\u003cb\u003eDoes EAGLE run on Windows 7/8/8.1/10?\u003c/b\u003e\u003c/p\u003e\n  \u003cp\u003eYes it does. EAGLE versions 6.x and 7.x are running without problems.\u003c/p\u003e\n  \u003cp\u003e\u003cb\u003eDoes EAGLE run on 64-bit Systems?\u003c/b\u003e\u003c/p\u003e\n  \u003cp\u003eAutodesk EAGLE only supports 64-bit operating systems.\u003c/p\u003e\n \u003c/div\u003e\n \u003cdiv id=\"products\" class=\"adskkb_products\"\u003e\n  \u003ch3\u003eProducts:\u003c/h3\u003e EAGLE;\n \u003c/div\u003e\n \u003cdiv id=\"versions\" class=\"adskkb_versions\"\u003e\n  \u003ch3\u003eVersions:\u003c/h3\u003e 2017;\n \u003c/div\u003e\n\u003c/div\u003e\u003c/div\u003e","publisher":"Autodesk","language":"english","releaseYear":"2024","lastUpdateDate":"2023-10-08 00:00:00","contentUrl":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/System-requirements-for-Autodesk-EAGLE.html","subSource":"FaqArticle","caasKey"
