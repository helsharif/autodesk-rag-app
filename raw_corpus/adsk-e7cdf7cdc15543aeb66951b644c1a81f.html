 and Windows 10 version 1809 or above. See Autodesk’s \u003ca href=\"https://knowledge.autodesk.com/customer-service/account-management/users-software/previous-versions/previous-version-support-policy\" target=\"_blank\"\u003eProduct Support Lifecycle\u003c/a\u003e for support information.\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eProcessor\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eMinimum\u003c/b\u003e: 2.5-2.9 gigahertz (GHz) processor. ARM processors are not supported\u003cbr\u003e \u003cb\u003eRecommended\u003c/b\u003e: 3.0 GHz or faster processor (base), 4+ GHz (turbo)\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eMemory\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e8 GB RAM\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eDisplay Resolution\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e1920x1080 (1080p)\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eDisplay Card\u003c/b\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cb\u003eMinimum\u003c/b\u003e: 1 GB GPU with 29 GB/S Bandwidth and DirectX 11 compliant\u003cbr\u003e \u003cb\u003eRecommended\u003c/b\u003e: 4 GB GPU with 106 GB/S Bandwidth and DirectX 12 compliant\u003cbr\u003e DirectX 12 with feature level 12_0 is required for Shaded(Fast) and Shaded with edges(Fast) visual styles.\u003cbr\u003e \u003cb\u003eNote\u003c/b\u003e: Make sure to use the latest video card manufacturer drivers from their website.\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003eDisk Space\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eInstallation 4 GB\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003ePointing Device\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003eMS-Mouse compliant\u003c/td\u003e\n    \u003c/tr\u003e\n    \u003ctr\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e\u003cstrong\u003e.NET Framework\u003c/strong\u003e\u003c/td\u003e\n     \u003ctd colspan=\"1\" rowspan=\"1\"\u003e.NET Framework Version 4.8\u003c/td\u003e\n    \u003c/tr\u003e\n   \u003c/tbody\u003e\n  \u003c/table\u003e\n \u003c/div\u003e\n \u003cdiv id=\"products\" class=\"adskkb_products\"\u003e\n  \u003ch3\u003eProducts:\u003c/h3\u003e DWG TrueView;\n \u003c/div\u003e\n \u003cdiv id=\"versions\" class=\"adskkb_versions\"\u003e\n  \u003ch3\u003eVersions:\u003c/h3\u003e 2023;\n \u003c/div\u003e\n\u003c/div\u003e\u003c/div\u003e","publisher":"Autodesk","language":"english","releaseYear":"2023","lastUpdateDate":"2023-10-08 00:00:00","contentUrl":"https://www.autodesk.com/support/technical/article/caas/sfdcarticles/sfdcarticles/System-requirements-for-Autodesk-DWG-TrueView-2023.html","subSource":"FaqArticle","caasKey":"caas/sfdcarticles/sfdcarticles/System-requirements-for-Autodesk-DWG-TrueView-2023.html","sfdcId":"kA93g000000GvS4","upiLanguage":"ENU","productRelease":["DWG TrueView 2023"],"productLine":["DWG TrueView"],"caseCount":"10","nodeId":"kA93g000000GvS4","caseId":["19720106","21340699","20794168","20027007","19176978","20777464","20110353","20085745","20027618","20245212"],"description":"This article provides the system requirements for Autodesk® DWG TrueView™ 2023.","knowledgeSource":"Technical Support","mediaType":["Text Only"],"audience":["User"],"versionNumber":"5","articleType":"FAQ","docnUrl":"System-requirements-for-Autodesk-DWG-TrueView-2023","versionId":"ka93g000000M5cnAAC","lastAttachedDate":"2023-10-13 00:00:00","articleNumber":"000476698","c
